ons": ["A. 대부분의 결함은 단일 파라미터의 오류로 발생한다", "B. 대부분의 결함은 두 파라미터의 상호작용 또는 단일 파라미터에 의해 발생한다", "C. 모든 파라미터 조합을 테스트해야 결함을 발견할 수 있다", "D. 세 개 이상의 파라미터 조합에서만 결함이 발생한다"], "answer": "B", "explanation": "연구에 따르면 실제 소프트웨어 결함의 대부분(약 70~85%)은 단일 파라미터 또는 두 파라미터의 상호작용에 의해 발생한다. 페어와이즈 테스트는 이 원리를 활용하여 효율적으로 결함을 발견한다."}, {"question": "기본 경로 테스트(Basis Path Testing)의 목표는?", "options": ["A. 모든 가능한 경로를 테스트한다", "B. 사이클로매틱 복잡도만큼의 선형 독립 경로를 모두 테스트한다", "C. 최단 경로만 테스트한다", "D. 루프 경로를 집중적으로 테스트한다"], "answer": "B", "explanation": "기본 경로 테스트는 제어 흐름 그래프를 분석하여 사이클로매틱 복잡도에 해당하는 수의 선형 독립 경로를 식별하고, 이 경로들을 모두 테스트하여 결정 커버리지를 달성하는 것이 목표이다."}, {"question": "테스트 체크리스트의 장점으로 옳지 않은 것은?", "options": ["A. 반복적인 테스트에서 일관성을 유지할 수 있다", "B. 경험과 지식을 체계적으로 공유할 수 있다", "C. 항상 완전한 테스트 커버리지를 보장한다", "D. 테스트 계획 수립 시 참고 자료로 활용할 수 있다"], "answer": "C", "explanation": "체크리스트 기반 테스트의 장점은 일관성, 경험 공유, 빠른 테스트 계획 수립 등이 있지만, 체크리스트가 불완전하거나 오래되었을 경우 완전한 커버리지를 보장할 수 없다."}, {"question": "결정 테이블 기법에서 '규칙(Rule)'이란?", "options": ["A. 테스트 수행 시 따라야 할 규정", "B. 조건들의 특정 조합과 그에 해당하는 행동을 정의한 것", "C. 결정 테이블을 작성하는 방법론", "D. 테스트 합격/불합격 기준"], "answer": "B", "explanation": "결정 테이블에서 규칙(Rule)은 조건들의 특정 True/False 조합(열)과 그 조합에 대응하는 행동(결과)을 함께 정의한 하나의 열을 의미한다."}, {"question": "조건 'A OR B'에서 결정 커버리지를 달성하지만 조건 커버리지를 달성하지 못하는 테스트 케이스 집합은?", "options": ["A. {A=T, B=F}, {A=F, B=T}", "B. {A=T, B=T}, {A=F, B=F}", "C. {A=T, B=F}", "D. {A=F, B=F}, {A=T, B=F}"], "answer": "B", "explanation": "{A=T, B=T}: 결정 결과=True / {A=F, B=F}: 결정 결과=False → 결정 커버리지 달성. 그러나 A는 T와 F 모두 평가되었고, B도 T와 F 모두 평가되었으므로 실제로 조건 커버리지도 달성된다. 이는 결정 커버리지가 조건 커버리지를 포함하지 않는 예시이다."}, {"question": "경계값 분석에서 '명세 경계(Specification boundary)'와 '내부 경계(Internal boundary)'의 주요 차이는?", "options": ["A. 명세 경계는 요구사항에 명시된 경계이고, 내부 경계는 코드 내부 로직에서 발생하는 경계이다", "B. 명세 경계는 테스트하고 내부 경계는 테스트하지 않는다", "C. 명세 경계는 블랙박스 기법이고, 내부 경계는 화이트박스 기법이다", "D. 두 경계의 차이는 없다"], "answer": "A", "explanation": "명세 경계는 요구사항 명세에 명시적으로 나타나는 경계(예: 1~100 범위)이고, 내부 경계는 소스코드 내 조건문에 의해 생성되는 경계(예: if x > 100에서 100이 경계값)이다."}, {"question": "리스크 기반 테스트(Risk-based Testing)에서 테스트 우선순위를 결정하는 기준은?", "options": ["A. 테스트의 실행 속도", "B. 결함의 발생 가능성과 영향도를 곱한 리스크 수준", "C. 테스트 케이스의 복잡도", "D. 테스트 자동화 가능 여부"], "answer": "B", "explanation": "리스크 기반 테스트에서는 결함 발생 가능성(Likelihood)과 결함이 발생했을 때의 영향도(Impact)를 곱하여 리스크 수준을 산정하고, 이를 기준으로 테스트 우선순위를 결정한다."}, {"question": "상태 전이 테스트에서 '무효 전이(Invalid Transition)' 테스트의 목적은?", "options": ["A. 모든 유효한 상태 전이를 빠르게 수행하는 것", "B. 발생해서는 안 되는 전이가 실제로 발생하지 않는지 확인하는 것", "C. 상태 전이 다이어그램을 검증하는 것", "D. 최단 경로로 모든 상태를 방문하는 것"], "answer": "B", "explanation": "무효 전이 테스트는 특정 상태에서 발생해서는 안 되는 이벤트가 처리될 때 시스템이 적절하게 오류를 처리하는지(예: 오류 메시지 출력, 상태 유지 등) 확인하는 음수(negative) 테스트이다."}, {"question": "코드 커버리지 측정 시 '실행 불가능한 코드(Unreachable Code)'란?", "options": ["A. 복잡한 알고리즘을 구현한 코드", "B. 어떤 테스트 케이스로도 실행할 수 없는 코드", "C. 조건문 내부의 코드", "D. 재귀 함수를 구현한 코드"], "answer": "B", "explanation": "실행 불가능한 코드(dead code)는 논리적으로 어떤 경우에도 실행될 수 없는 코드로, 불필요한 코드이거나 로직 오류를 나타낼 수 있다. 이런 코드가 있으면 이론적으로 구문 커버리지 100%를 달성할 수 없다."}, {"question": "문자열 입력에 대한 동등 분할 파티션을 정의할 때 고려할 사항으로 옳지 않은 것은?", "options": ["A. 빈 문자열", "B. 최대 길이 초과 문자열", "C. 특수 문자 포함 문자열", "D. 문자열의 알고리즘 처리 시간"], "answer": "D", "explanation": "문자열 동등 분할 파티션에는 빈 문자열, 유효 문자열, 최대 길이 초과, 특수 문자 포함, Null 등이 포함된다. 알고리즘 처리 시간은 성능 테스트의 관심 대상이다."}, {"question": "제어 흐름 그래프에서 '에지(Edge)'가 나타내는 것은?", "options": ["A. 변수의 선언", "B. 노드 간의 제어 전이(흐름)", "C. 함수의 반환값", "D. 반복문의 횟수"], "answer": "B", "explanation": "제어 흐름 그래프에서 에지(화살표)는 한 노드에서 다른 노드로의 제어 전이, 즉 실행 흐름의 방향을 나타낸다."}, {"question": "페어와이즈 테스트 도구(예: PICT)가 하는 역할은?", "options": ["A. 소스코드를 자동으로 분석하는 것", "B. 모든 파라미터 쌍의 조합을 커버하는 최소한의 테스트 케이스 집합을 생성하는 것", "C. 테스트를 자동으로 실행하는 것", "D. 성능을 측정하는 것"], "answer": "B", "explanation": "PICT와 같은 페어와이즈 테스트 도구는 파라미터와 값을 입력받아, 모든 파라미터 쌍의 조합을 최소한으로 커버하는 최적화된 테스트 케이스 집합을 자동으로 생성한다."}, {"question": "탐색적 테스트에서 '타임박스(Timebox)'의 역할은?", "options": ["A. 테스트 케이스의 수를 제한한다", "B. 테스트 세션의 시간을 고정하여 집중력과 효율성을 높인다", "C. 테스터의 작업 시간을 모니터링한다", "D. 결함 수정 시간을 제한한다"], "answer": "B", "explanation": "탐색적 테스트에서 타임박스는 일반적으로 90~120분의 고정된 시간 동안 집중적으로 탐색 테스트를 수행하는 세션 기반 접근법이다. 이를 통해 집중력을 유지하고 진행 상황을 관리한다."}, {"question": "원인-결과 그래프에서 'ONLY ONE' 제약조건의 의미는?", "options": ["A. 원인 중 정확히 하나만 True일 수 있다", "B. 결과가 반드시 하나만 발생해야 한다", "C. 원인은 하나만 있어야 한다", "D. 테스트 케이스는 하나만 생성된다"], "answer": "A", "explanation": "원인-결과 그래프의 'ONLY ONE' 제약조건은 해당 그룹의 원인들 중 최대 하나만 True(1)일 수 있음을 나타내는 제약이다."}, {"question": "안전 중요 소프트웨어(Safety-critical Software)에서 일반적으로 요구하는 최소 커버리지 기준은?", "options": ["A. 구문 커버리지", "B. 결정 커버리지", "C. MC/DC", "D. 다중 조건 커버리지"], "answer": "C", "explanation": "DO-178C 레벨 A(가장 중요), IEC 61508 SIL 4, ISO 26262 ASIL D 등 최고 안전 등급에서는 MC/DC가 요구된다. MC/DC는 각 조건이 독립적으로 결정에 영향을 미침을 보장하면서 다중 조건 커버리지보다 적은 테스트 케이스로 높은 보장을 제공한다."}, {"question": "동등 분할을 이용하여 테스트할 때 무효 동등 클래스도 반드시 테스트해야 하는 이유는?", "options": ["A. 유효 입력만으로는 테스트 케이스를 도출할 수 없기 때문이다", "B. 시스템이 잘못된 입력에 대해 올바른 오류 처리를 하는지 확인하기 위해서이다", "C. 무효 입력이 더 많은 결함을 유발하기 때문이다", "D. 무효 클래스의 테스트가 더 쉽기 때문이다"], "answer": "B", "explanation": "무효 동등 클래스 테스트는 시스템이 잘못된 입력에 대해 적절한 오류 메시지를 출력하거나, 예외를 처리하거나, 적절히 거부하는지 확인하는 음수 테스트(negative testing)의 중요한 부분이다."}, {"question": "데이터 흐름 테스트에서 정의-사용 커버리지(def-use coverage)에서 가장 강력한 기준은?", "options": ["A. 모든 정의(all-defs) 커버리지", "B. 모든 사용(all-uses) 커버리지", "C. 모든 정의-사용 경로(all-du-paths) 커버리지", "D. 모든 구문(all-statements) 커버리지"], "answer": "C", "explanation": "데이터 흐름 커버리지 강도: all-defs < all-uses < all-du-paths. '모든 정의-사용 경로' 커버리지가 가장 강력하며, 변수의 각 정의에서 모든 사용점까지의 모든 경로를 테스트한다."}, {"question": "유스케이스 테스트에서 '기본 흐름(Basic Flow)' 테스트의 목적은?", "options": ["A. 오류 처리를 검증한다", "B. 가장 일반적이고 정상적인 사용 시나리오가 올바르게 동작하는지 검증한다", "C. 성능 요구사항을 검증한다", "D. 보안 요구사항을 검증한다"], "answer": "B", "explanation": "기본 흐름(정상 흐름) 테스트는 아무런 장애나 오류 없이 최선의 경우(best case)로 진행되는 정상적인 사용 시나리오가 명세대로 동작하는지 검증한다."}, {"question": "중첩 루프(Nested Loop) 테스트에서 권장되는 전략은?", "options": ["A. 모든 루프를 동시에 최대 횟수로 실행한다", "B. 내부 루프부터 시작하여 단순 루프로 테스트하고, 외부 루프로 진행한다", "C. 가장 외부 루프만 테스트한다", "D. 무작위로 루프 조합을 선택하여 테스트한다"], "answer": "B", "explanation": "중첩 루프 테스트에서는 가장 안쪽 루프부터 시작하여 단순 루프로 처리하고, 외부 루프의 값은 최솟값으로 고정한다. 그 다음 외부로 이동하면서 같은 방식을 적용하는 안-밖(inside-out) 전략이 권장된다."}, {"question": "테스트 조건(Test Condition)이란?", "options": ["A. 테스트를 실행하기 위한 하드웨어 요구사항이다", "B. 테스트 대상 항목에서 테스트할 수 있는 측면이나 특성이다", "C. 테스트 합격/불합격을 결정하는 기준이다", "D. 테스트 환경의 네트워크 설정이다"], "answer": "B", "explanation": "테스트 조건은 테스트 항목(요구사항, 사용자 스토리, 유스케이스 등)에서 테스트할 수 있는 특성, 기능, 시나리오 또는 속성이다. 테스트 케이스는 하나 이상의 테스트 조건을 커버한다."}, {"question": "순서가 있는 집합(ordered set)에서 경계값은?", "options": ["A. 집합의 첫 번째 요소와 마지막 요소", "B. 집합의 중간 요소", "C. 집합에서 가장 큰 요소만", "D. 집합의 모든 요소"], "answer": "A", "explanation": "순서가 있는 집합(배열, 리스트 등)에서 경계값은 첫 번째 요소(최솟값)와 마지막 요소(최댓값)이다. 이 경계에서 오류가 많이 발생하므로 경계값 분석의 대상이 된다."}, {"question": "조건/결정 커버리지(CDC)가 구문 커버리지보다 강력한 이유는?", "options": ["A. 더 적은 테스트 케이스로 달성 가능하기 때문이다", "B. CDC 달성 시 자동으로 구문 커버리지가 달성되지만, 그 역은 성립하지 않기 때문이다", "C. 구문 커버리지는 블랙박스 기법이기 때문이다", "D. CDC는 소스코드 없이도 적용 가능하기 때문이다"], "answer": "B", "explanation": "CDC를 달성하면 모든 분기(True/False)가 실행되므로 모든 구문도 실행되어 구문 커버리지가 자동으로 달성된다. 반면 구문 커버리지를 달성해도 CDC는 달성되지 않을 수 있으므로 CDC가 더 강력하다."}, {"question": "탐색적 테스트에서 '가이드라인 기반 탐색(Guideline-based Exploration)'이란?", "options": ["A. 법적 가이드라인에 따라 수행하는 테스트이다", "B. 특정 가이드라인이나 휴리스틱을 활용하여 탐색 방향을 정하는 테스트이다", "C. 가이드 없이 자유롭게 탐색하는 테스트이다", "D. 국제 표준에 따라 테스트 케이스를 설계하는 것이다"], "answer": "B", "explanation": "가이드라인 기반 탐색은 경험 기반 휴리스틱(예: 모든 오류 메시지 확인, 극단적인 값 입력 시도, 취소 기능 테스트 등)을 가이드라인으로 활용하여 탐색적 테스트의 방향을 체계화하는 방법이다."}, {"question": "임베디드 시스템 소프트웨어의 유닛 테스트에서 가장 많이 사용되는 기법은?", "options": ["A. 탐색적 테스트", "B. 유스케이스 테스트", "C. 화이트박스 테스트(구조 기반 기법)", "D. 페어와이즈 테스트"], "answer": "C", "explanation": "임베디드 시스템 유닛 테스트에서는 소스코드에 직접 접근하여 코드 커버리지(구문, 결정, MC/DC 등)를 측정하는 화이트박스 기법이 주로 사용된다. 특히 안전 중요 임베디드 시스템에서는 MC/DC가 필수적으로 요구된다."}, {"question": "테스트 설계 기법을 선택할 때 고려해야 할 요소가 아닌 것은?", "options": ["A. 소프트웨어의 리스크 수준", "B. 테스트 시간 및 예산", "C. 개발자의 프로그래밍 언어 선호도", "D. 규제 요구사항 및 표준"], "answer": "C", "explanation": "테스트 설계 기법 선택 시 고려 요소에는 소프트웨어 리스크, 테스트 목표, 가용 시간/예산, 규제 요구사항, 소프트웨어 유형, 요구사항 문서화 수준 등이 있다. 개발자의 프로그래밍 언어 선호도는 직접적인 고려 요소가 아니다."}]};

];
const QUIZ_N=40, UNIT_N=30;

function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function buildQueue(mode){
  if(mode==="all"){
    const n1=Math.round(QUIZ_N*RATIO.unit1),n2=Math.round(QUIZ_N*RATIO.unit2),n3=QUIZ_N-n1-n2;
    return shuffle([
      ...shuffle(BANK.unit1).slice(0,n1).map(q=>({...q,unit:"1단원"})),
      ...shuffle(BANK.unit2).slice(0,n2).map(q=>({...q,unit:"2단원"})),
      ...shuffle(BANK.unit3).slice(0,n3).map(q=>({...q,unit:"3단원"})),
    ]);
  }
  return shuffle(BANK[mode]).slice(0,UNIT_N).map(q=>({...q,unit:mode}));
}

      e("div",{style:{textAlign:"center",marginBottom:"24px"}},
        e("div",{style:{display:"inline-block",background:"linear-gradient(90deg,#6366f1,#ec4899)",borderRadius:"99px",padding:"5px 18px",fontSize:"11px",fontWeight:700,letterSpacing:"2px",color:"#fff",marginBottom:"10px"}},"CSTS 퀴즈 마스터"),
        e("h1",{style:{fontSize:"26px",fontWeight:800,background:"linear-gradient(90deg,#a5b4fc,#f0abfc)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:"6px 0 4px"}},"소프트웨어 테스트 자격증"),
        e("p",{style:{color:"#64748b",fontSize:"13px"}},"총 300문제 내장 · API 없이 즉시 실행")
      ),
      // 단원 선택
      e("p",{style:{fontSize:"12px",fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"1px",marginBottom:"10px"}},"📚 학습 모드 선택"),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"9px",marginBottom:"20px"}},
        ...MODES.map(md=>
          e("button",{key:md.id,onClick:()=>setSel(md.id),style:{
            background:sel===md.id?`${md.color}22`:"rgba(255,255,255,.04)",
            border:`2px solid ${sel===md.id?md.color:"rgba(255,255,255,.1)"}`,
            borderRadius:"13px",padding:"14px",cursor:"pointer",textAlign:"left",transition:"all .2s",
            gridColumn:md.id==="all"?"1/-1":"auto",
          }},
            e("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
              e("span",{style:{fontSize:"22px"}},md.emoji),
              e("div",null,
                e("div",{style:{fontWeight:700,fontSize:"14px",color:sel===md.id?md.color:"#e2e8f0"}},md.label),
                e("div",{style:{fontSize:"11px",color:"#64748b",marginTop:"1px"}},md.tag)
              ),
              md.id==="all"&&e("div",{style:{marginLeft:"auto",textAlign:"right"}},
                e("div",{style:{fontSize:"11px",color:"#ec4899",fontWeight:700}},"실전 출제 비율"),
                e("div",{style:{fontSize:"10px",color:"#64748b"}},"1단원25%·2단원45%·3단원30%")
              )
            )
          )
        )
      ),
      // 안내박스
      e("div",{style:{background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.2)",borderRadius:"11px",padding:"13px 16px",marginBottom:"18px",fontSize:"13px",color:"#a5b4fc",lineHeight:1.7}},
        sel==="all"
          ? e("span",null,e("strong",null,"🎯 통합 실전 모드")," — CSTS 실제 시험 출제 비율로 ",e("strong",null,"40문제")," 출제",e("br"),e("span",{style:{fontSize:"12px",color:"#6366f1"}},"1단원 10문제(25%) · 2단원 18문제(45%) · 3단원 12문제(30%)"))
          : e("span",null,e("strong",null,`📘 ${m.label} 단원 모드`)," — 100문제 중 무작위 ",e("strong",null,"30문제")," 출제",e("br"),e("span",{style:{fontSize:"12px",color:"#6366f1"}},"매번 새로운 문제 조합 · 틀린 문제 해설 제공"))
      ),
      e("button",{style:primaryBtn(m.color),onClick:()=>onStart(sel)},`${m.emoji} ${sel==="all"?"통합 실전 시험 시작":m.label+" 퀴즈 시작"}`)
    )
  );
}

// ── Quiz ──
function Quiz({mode,onExit}){
  const mInfo=MODES.find(x=>x.id===mode);
  const [queue]=useState(()=>buildQueue(mode));
  const [idx,setIdx]=useState(0);
  const [chosen,setChosen]=useState(null);
  const [score,setScore]=useState({c:0,t:0});
  const [wrong,setWrong]=useState([]);
  const [done,setDone]=useState(false);
  const q=queue[idx];
  const total=queue.length;
  const acc=score.t>0?Math.round((score.c/score.t)*100):0;
  const pct=Math.round(((idx+(chosen?1:0))/total)*100);

  function pick(opt){
    if(chosen)return;
    const lt=opt[0];
    setChosen(lt);
    const ok=lt===q.answer;
    setScore(s=>({c:s.c+(ok?1:0),t:s.t+1}));
    if(!ok)setWrong(w=>[...w,{...q,your:lt}]);
  }
  function next(){
    if(idx+1>=total){setDone(true);return;}
    setIdx(i=>i+1);setChosen(null);
  }

  if(done)return e(Result,{score,total,wrong,mInfo,onExit});

  return e("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",padding:"20px 16px"}},
    e("div",{style:card,className:"fade"},
      // 상단 바
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px",padding:"10px 14px",background:"rgba(255,255,255,.04)",borderRadius:"11px",border:"1px solid rgba(255,255,255,.07)"}},
        e("div",{style:{display:"flex",gap:"6px",alignItems:"center"}},
          e("span",{style:{fontSize:"16px"}},mInfo.emoji),
          e("span",{style:{fontSize:"13px",color:mInfo.color,fontWeight:600}},mInfo.label),
          mode==="all"&&q.unit&&e("span",{style:{fontSize:"11px",background:"rgba(255,255,255,.08)",borderRadius:"99px",padding:"2px 8px",color:"#94a3b8"}},q.unit)
        ),
        e("div",{style:{display:"flex",gap:"10px",alignItems:"center"}},
          e("span",{style:{fontSize:"13px",color:"#22c55e",fontWeight:700}},`✅ ${score.c}`),
          e("span",{style:{color:"#334155"}},"|"),
          e("span",{style:{fontSize:"13px",color:"#ef4444",fontWeight:700}},`❌ ${score.t-score.c}`),
          e("span",{style:{color:"#334155"}},"|"),
          e("span",{style:{fontSize:"13px",color:"#6366f1",fontWeight:700}},`${acc}%`),
          e("button",{onClick:onExit,style:{...secBtn,padding:"6px 12px"}},"나가기")
        )
      ),
      // 진행바
      e("div",{style:{marginBottom:"18px"}},
        e("div",{style:{height:"5px",background:"rgba(255,255,255,.07)",borderRadius:"99px",overflow:"hidden"}},
          e("div",{style:{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${mInfo.color},#22c55e)`,borderRadius:"99px",transition:"width .4s"}})
        ),
        e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"#475569",marginTop:"4px"}},
          e("span",null,`${idx+1} / ${total} 문제`),
          e("span",null,`${pct}% 완료`)
        )
      ),
      // 문제
      e("div",{className:chosen?"pop":"",key:idx},
        e("div",{style:{marginBottom:"20px"}},
          e("div",{style:{fontSize:"11px",fontWeight:700,color:mInfo.color,marginBottom:"8px",textTransform:"uppercase",letterSpacing:"1px"}},`Q${idx+1}`),
          e("p",{style:{fontSize:"16px",lineHeight:1.8,fontWeight:600,color:"#e2e8f0"}},q.question)
        ),
        e("div",{style:{display:"flex",flexDirection:"column",gap:"9px"}},
          ...q.options.map(opt=>{
            const lt=opt[0];
            const isCh=chosen===lt,isOk=lt===q.answer;
            const showOk=chosen&&isOk,showBad=chosen&&isCh&&!isOk;
            return e("button",{key:opt,onClick:()=>pick(opt),style:optBtn(chosen,isOk,isCh)},
              `${showOk?"✅ ":showBad?"❌ ":""}${opt}`
            );
          })
        ),
        chosen&&e("div",{className:"fade"},
          e("div",{style:{marginTop:"15px",padding:"15px",background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.25)",borderRadius:"12px",fontSize:"14px",lineHeight:1.75,color:"#c7d2fe"}},
            e("strong",{style:{color:"#a5b4fc"}},"💡 해설"),e("br"),q.explanation
          ),
          e("button",{style:primaryBtn(mInfo.color),onClick:next},idx+1<total?"다음 문제 →":"결과 보기 🏁")
        )
      )
    )
  );
}

// ── Result ──
function Result({score,total,wrong,mInfo,onExit}){
  const pct=Math.round((score.c/total)*100);
  const grade=pct>=80?"합격권 🎉":pct>=60?"양호 👍":pct>=40?"보통 📚":"복습 필요 💪";
  const gc=pct>=80?"#22c55e":pct>=60?"#f59e0b":pct>=40?"#f97316":"#ef4444";
  const [sw,setSw]=useState(false);

  return e("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",padding:"24px 16px"}},
    e("div",{style:card,className:"fade"},
      e("div",{style:{textAlign:"center",marginBottom:"22px"}},
        e("div",{style:{fontSize:"50px",marginBottom:"8px"}},pct>=80?"🏆":pct>=60?"🥈":pct>=40?"🥉":"📖"),
        e("div",{style:{fontSize:"13px",color:"#64748b",marginBottom:"4px"}},`${mInfo.emoji} ${mInfo.label} 결과`),
        e("div",{style:{fontSize:"46px",fontWeight:800,color:gc}},`${pct}점`),
        e("div",{style:{fontSize:"15px",color:gc,fontWeight:600,marginTop:"3px"}},grade)
      ),
      // 점수 카드
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"18px"}},
        ...[ ["✅ 정답",score.c,"#22c55e"],["❌ 오답",score.t-score.c,"#ef4444"],["📝 총문제",total,"#6366f1"] ].map(([lb,v,c])=>
          e("div",{key:lb,style:{background:`${c}14`,border:`1px solid ${c}30`,borderRadius:"11px",padding:"14px",textAlign:"center"}},
            e("div",{style:{fontSize:"22px",fontWeight:800,color:c}},v),
            e("div",{style:{fontSize:"11px",color:"#64748b",marginTop:"3px"}},lb)
          )
        )
      ),
      // 진행바
      e("div",{style:{marginBottom:"18px"}},
        e("div",{style:{height:"8px",background:"rgba(255,255,255,.07)",borderRadius:"99px",overflow:"hidden"}},
          e("div",{style:{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${mInfo.color},#22c55e)`,borderRadius:"99px",transition:"width .8s ease"}})
        ),
        e("div",{style:{fontSize:"12px",color:"#475569",marginTop:"5px",textAlign:"right"}},`정답률 ${pct}% (합격 기준 70점 이상)`)
      ),
      // 오답노트
      wrong.length>0&&e("div",{style:{marginBottom:"16px"}},
        e("button",{onClick:()=>setSw(v=>!v),style:{...secBtn,width:"100%",textAlign:"center",padding:"11px"}},
          sw?"▲ 오답노트 닫기":`▼ 오답노트 보기 (틀린 ${wrong.length}문제)`
        ),
        sw&&e("div",{className:"fade",style:{marginTop:"10px",display:"flex",flexDirection:"column",gap:"10px",maxHeight:"420px",overflowY:"auto",paddingRight:"4px"}},
          ...wrong.map((wq,i)=>
            e("div",{key:i,style:{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:"12px",padding:"14px"}},
              e("div",{style:{fontSize:"12px",color:"#ef4444",fontWeight:700,marginBottom:"6px"}},`Q${i+1} · 내 답: ${wq.your} / 정답: ${wq.answer}`),
              e("div",{style:{fontSize:"14px",color:"#e2e8f0",fontWeight:600,marginBottom:"8px"}},wq.question),
              ...wq.options.map(opt=>
                e("div",{key:opt,style:{fontSize:"13px",padding:"4px 8px",borderRadius:"6px",marginBottom:"3px",background:opt[0]===wq.answer?"rgba(34,197,94,.15)":opt[0]===wq.your?"rgba(239,68,68,.15)":"transparent",color:opt[0]===wq.answer?"#86efac":opt[0]===wq.your?"#fca5a5":"#64748b"}},
                  `${opt[0]===wq.answer?"✅ ":opt[0]===wq.your?"❌ ":""}${opt}`
                )
              ),
              e("div",{style:{marginTop:"8px",padding:"10px",background:"rgba(99,102,241,.1)",borderRadius:"8px",fontSize:"13px",color:"#c7d2fe",lineHeight:1.6}},`💡 ${wq.explanation}`)
            )
          )
        )
      ),
      e("div",{style:{display:"flex",gap:"9px"}},
        e("button",{style:{...secBtn,flex:1,textAlign:"center",padding:"12px"},onClick:onExit},"← 모드 선택"),
        e("button",{style:{...primaryBtn(mInfo.color),flex:2,marginTop:0},onClick:()=>window.location.reload()},"🔄 다시 풀기")
      )
    )
  );
}

// ── App ──
function App(){
  const [mode,setMode]=useState(null);
  if(!mode)return e(Setup,{onStart:setMode});
  return e(Quiz,{mode,onExit:()=>setMode(null)});
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App,null));
</script>
</body>
</html>
