<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%);min-height:100vh;font-family:"Segoe UI",system-ui,sans-serif;color:#e2e8f0}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
.fade{animation:fadeIn .3s ease}

<script>
const BANK={unit1:[{"question": "소프트웨어 테스팅의 주요 목적으로 가장 적절한 것은?", "options": ["A. 소프트웨어에 결함이 없음을 증명하는 것", "B. 소프트웨어에 존재하는 결함을 발견하는 것", "C. 소프트웨어를 완벽하게 만드는 것", "D. 소프트웨어 개발 비용을 절감하는 것"], "answer": "B", "explanation": "테스팅의 주요 목적은 결함을 발견하는 것이며, 테스팅이 결함이 없음을 증명할 수는 없다."}, {"question": "다음 중 소프트웨어 테스팅의 7가지 원칙에 해당하지 않는 것은?", "options": ["A. 테스팅은 결함의 존재를 보여준다", "B. 완벽한 테스팅은 가능하다", "C. 테스팅은 조기에 시작한다", "D. 결함 집중(Defect Clustering)"], "answer": "B", "explanation": "완벽한 테스팅(Exhaustive Testing)은 불가능하다는 것이 테스팅의 원칙 중 하나이다."}, {"question": "소프트웨어 개발자가 실수(Mistake)를 하여 코드에 발생한 것을 무엇이라 하는가?", "options": ["A. 장애(Failure)", "B. 결함(Defect/Bug)", "C. 오류(Error)", "D. 리스크(Risk)"], "answer": "C", "explanation": "오류(Error)는 사람(개발자)이 저지르는 실수이며, 이 실수가 코드에 반영된 것이 결함(Defect)이다."}, {"question": "소프트웨어가 실행 중에 요구사항과 다르게 동작하는 현상을 무엇이라 하는가?", "options": ["A. 오류(Error)", "B. 결함(Defect)", "C. 장애(Failure)", "D. 버그(Bug)"], "answer": "C", "explanation": "장애(Failure)는 소프트웨어가 실행 시 예상과 다르게 동작하는 외부적으로 관찰 가능한 현상이다."}, {"question": "테스트 베이시스(Test Basis)에 대한 설명으로 올바른 것은?", "options": ["A. 테스트 결과를 기록하는 문서", "B. 테스트 케이스를 도출하는 근거가 되는 문서나 정보", "C. 테스트를 수행하는 환경", "D. 테스트 완료 기준을 정의하는 문서"], "answer": "B", "explanation": "테스트 베이시스는 테스트 케이스를 설계하는 데 기반이 되는 요구사항, 설계 문서, 코드 등의 정보를 말한다."}, {"question": "결함 집중(Defect Clustering) 원칙에 대한 설명으로 가장 올바른 것은?", "options": ["A. 결함은 소프트웨어 전체에 균일하게 분포한다", "B. 결함은 소수의 모듈에 집중적으로 존재하는 경향이 있다", "C. 결함은 항상 중요한 기능에만 발생한다", "D. 결함은 테스트 단계에서만 발견된다"], "answer": "B", "explanation": "파레토 법칙에 따라 전체 결함의 80%가 20%의 모듈에 집중되는 경향이 있다."}, {"question": "살충제 패러독스(Pesticide Paradox)란 무엇인가?", "options": ["A. 테스트를 많이 할수록 결함이 더 많이 발견된다", "B. 동일한 테스트를 반복하면 새로운 결함을 발견하는 능력이 저하된다", "C. 테스트 자동화가 수동 테스트보다 효과적이다", "D. 테스트 환경이 실제 환경과 다를수록 결함이 많아진다"], "answer": "B", "explanation": "살충제 패러독스는 동일한 테스트를 반복 실행하면 결함을 더 이상 찾지 못하는 현상으로, 테스트 케이스를 지속적으로 갱신해야 함을 의미한다."}, {"question": "테스팅은 컨텍스트에 의존한다(Testing is Context Dependent)는 원칙의 의미로 올바른 것은?", "options": ["A. 모든 소프트웨어에 동일한 테스트 방법을 적용해야 한다", "B. 테스트 방법과 기법은 소프트웨어 유형과 상황에 따라 달라야 한다", "C. 테스트는 항상 동일한 순서로 수행해야 한다", "D. 테스트 자동화는 항상 필요하다"], "answer": "B", "explanation": "항공기 안전 소프트웨어와 전자상거래 웹사이트는 서로 다른 테스트 접근 방법이 필요하다."}, {"question": "오류 부재의 궤변(Absence-of-Errors Fallacy)에 대한 올바른 설명은?", "options": ["A. 결함이 없으면 소프트웨어는 항상 성공한다", "B. 결함이 없더라도 사용자 요구를 만족하지 못하면 의미가 없다", "C. 결함이 없는 소프트웨어는 테스트가 필요 없다", "D. 결함이 없으면 테스트를 중단해도 된다"], "answer": "B", "explanation": "결함이 발견되지 않았다고 해서 소프트웨어가 사용자의 요구를 충족한다는 것을 보장하지는 않는다."}, {"question": "소프트웨어 테스팅에서 '조기 테스팅(Early Testing)' 원칙의 이점은?", "options": ["A. 테스트 케이스 작성이 쉬워진다", "B. 결함을 조기에 발견하여 수정 비용을 절감할 수 있다", "C. 개발 속도가 빨라진다", "D. 테스트 자동화가 용이해진다"], "answer": "B", "explanation": "결함을 조기에 발견할수록 수정 비용이 적게 들며, 요구사항 단계의 결함이 가장 저렴하게 수정된다."}, {"question": "V 모델에서 단위 테스트(Unit Test)와 대응되는 개발 단계는?", "options": ["A. 요구사항 분석", "B. 시스템 설계", "C. 상세 설계(컴포넌트 설계)", "D. 통합 설계"], "answer": "C", "explanation": "V 모델에서 단위(컴포넌트) 테스트는 상세 설계 단계에 대응된다."}, {"question": "V 모델에서 인수 테스트(Acceptance Test)와 대응되는 개발 단계는?", "options": ["A. 상세 설계", "B. 시스템 설계", "C. 요구사항 분석", "D. 코딩"], "answer": "C", "explanation": "인수 테스트는 요구사항 분석 단계에 대응되며, 사용자 요구사항 충족 여부를 확인한다."}, {"question": "테스트 레벨(Test Level) 중 전체 시스템의 기능 및 비기능 요구사항을 검증하는 단계는?", "options": ["A. 단위 테스트", "B. 통합 테스트", "C. 시스템 테스트", "D. 인수 테스트"], "answer": "C", "explanation": "시스템 테스트는 완성된 시스템 전체를 대상으로 기능 및 비기능 요구사항을 검증한다."}, {"question": "다음 중 정적 테스팅(Static Testing)에 해당하는 것은?", "options": ["A. 단위 테스트", "B. 코드 리뷰", "C. 시스템 테스트", "D. 회귀 테스트"], "answer": "B", "explanation": "정적 테스팅은 소프트웨어를 실행하지 않고 수행하는 테스팅으로, 코드 리뷰, 인스펙션, 워크스루 등이 포함된다."}, {"question": "동적 테스팅(Dynamic Testing)에 대한 설명으로 올바른 것은?", "options": ["A. 소프트웨어를 실행하지 않고 수행하는 테스팅", "B. 소프트웨어를 실행하면서 수행하는 테스팅", "C. 문서를 검토하는 테스팅", "D. 코드를 분석하는 테스팅"], "answer": "B", "explanation": "동적 테스팅은 소프트웨어를 실제로 실행하여 수행하는 테스팅이다."}, {"question": "화이트박스 테스팅(White-box Testing)의 다른 명칭으로 올바른 것은?", "options": ["A. 블랙박스 테스팅", "B. 구조 기반 테스팅", "C. 경험 기반 테스팅", "D. 명세 기반 테스팅"], "answer": "B", "explanation": "화이트박스 테스팅은 코드의 내부 구조를 기반으로 하기 때문에 구조 기반 테스팅이라고도 한다."}, {"question": "블랙박스 테스팅(Black-box Testing)의 다른 명칭으로 올바른 것은?", "options": ["A. 구조 기반 테스팅", "B. 명세 기반 테스팅", "C. 코드 기반 테스팅", "D. 경험 기반 테스팅"], "answer": "B", "explanation": "블랙박스 테스팅은 내부 구조를 모르고 명세(요구사항)를 기반으로 수행하므로 명세 기반 테스팅이라고도 한다."}, {"question": "테스트 케이스(Test Case)의 구성 요소가 아닌 것은?", "options": ["A. 테스트 입력값", "B. 예상 결과", "C. 소스 코드", "D. 사전 조건"], "answer": "C", "explanation": "테스트 케이스는 테스트 ID, 입력값, 사전 조건, 예상 결과, 사후 조건 등으로 구성되며 소스 코드는 포함되지 않는다."}, {"question": "테스트 수트(Test Suite)에 대한 설명으로 올바른 것은?", "options": ["A. 단일 테스트 케이스", "B. 관련된 테스트 케이스들의 집합", "C. 테스트 실행 환경", "D. 테스트 결과 보고서"], "answer": "B", "explanation": "테스트 수트는 특정 기능이나 목적에 관련된 테스트 케이스들의 집합이다."}, {"question": "테스트 오라클(Test Oracle)이란 무엇인가?", "options": ["A. 테스트를 자동화하는 도구", "B. 테스트 결과가 올바른지 판단하는 기준이나 메커니즘", "C. 테스트 케이스를 생성하는 도구", "D. 테스트 환경을 구성하는 도구"], "answer": "B", "explanation": "테스트 오라클은 테스트 실행 결과가 올바른지 여부를 판단하기 위한 기준으로, 요구사항 명세서, 기존 시스템, 사용자 기대치 등이 될 수 있다."}, {"question": "리그레션 테스팅(Regression Testing)의 목적으로 가장 적절한 것은?", "options": ["A. 새로운 기능을 검증하는 것", "B. 변경으로 인해 기존 기능에 영향이 없는지 확인하는 것", "C. 시스템 성능을 측정하는 것", "D. 보안 취약점을 찾는 것"], "answer": "B", "explanation": "회귀 테스팅은 소프트웨어 변경(수정, 추가) 후 기존 기능에 부작용이 발생하지 않았는지 확인하기 위해 수행한다."}, {"question": "확인 테스팅(Confirmation Testing)이란 무엇인가?", "options": ["A. 결함이 수정된 후 해당 결함이 올바르게 수정되었는지 확인하는 테스팅", "B. 소프트웨어의 성능을 확인하는 테스팅", "C. 사용자가 소프트웨어를 수용할 수 있는지 확인하는 테스팅", "D. 소프트웨어의 보안을 확인하는 테스팅"], "answer": "A", "explanation": "확인 테스팅(재테스팅)은 결함이 수정된 후 해당 결함이 올바르게 수정되었는지 다시 테스트하는 것이다."}, {"question": "테스트 계획(Test Plan)에 포함되지 않는 것은?", "options": ["A. 테스트 범위", "B. 테스트 일정", "C. 테스트 케이스 상세 내용", "D. 테스트 종료 기준"], "answer": "C", "explanation": "테스트 계획에는 범위, 접근 방법, 자원, 일정, 위험 등이 포함되며, 상세 테스트 케이스는 테스트 설계 단계에서 작성된다."}, {"question": "소프트웨어 품질 특성 중 명시된 조건에서 필요한 기능을 수행하는 능력을 의미하는 것은?", "options": ["A. 신뢰성(Reliability)", "B. 기능성(Functionality)", "C. 유지보수성(Maintainability)", "D. 효율성(Efficiency)"], "answer": "B", "explanation": "기능성은 소프트웨어가 명시된 조건 하에 필요한 기능을 제공하는 능력이다."}, {"question": "ISO/IEC 25010에서 정의하는 소프트웨어 품질 특성이 아닌 것은?", "options": ["A. 기능 적합성", "B. 성능 효율성", "C. 코드 복잡도", "D. 호환성"], "answer": "C", "explanation": "ISO/IEC 25010의 품질 특성에는 기능 적합성, 성능 효율성, 호환성, 사용성, 신뢰성, 보안성, 유지보수성, 이식성이 포함된다."}, {"question": "테스트 완료 기준(Exit Criteria)으로 적절하지 않은 것은?", "options": ["A. 목표 코드 커버리지 달성", "B. 잔여 결함이 허용 수준 이하", "C. 모든 테스트 케이스 실행 완료", "D. 모든 결함이 수정됨"], "answer": "D", "explanation": "모든 결함 수정이 반드시 완료 기준이 되지는 않으며, 심각도에 따라 일부 결함이 남아있어도 배포 가능할 수 있다."}, {"question": "인스펙션(Inspection)에 관한 설명으로 올바른 것은?", "options": ["A. 비공식적인 검토 방법이다", "B. 작성자가 주도하여 진행한다", "C. 공식적인 검토 방법으로 독립된 진행자가 주도한다", "D. 체크리스트를 사용하지 않는다"], "answer": "C", "explanation": "인스펙션은 가장 공식적인 정적 검토 방법으로 훈련된 독립적인 진행자(Moderator)가 주도하며 체크리스트를 활용한다."}, {"question": "워크스루(Walkthrough)에 대한 설명으로 올바른 것은?", "options": ["A. 가장 공식적인 검토 방법이다", "B. 작성자가 주도하여 자신의 작업물을 동료들에게 설명하는 방식이다", "C. 독립적인 진행자가 반드시 필요하다", "D. 프로세스가 엄격하게 정해져 있다"], "answer": "B", "explanation": "워크스루는 작성자가 주도적으로 진행하며, 동료들이 함께 산출물을 검토하는 비교적 비공식적인 리뷰 방법이다."}, {"question": "리스크 기반 테스팅(Risk-based Testing)에서 리스크를 결정하는 두 가지 요소는?", "options": ["A. 발생 가능성(Likelihood)과 영향도(Impact)", "B. 테스트 비용과 테스트 시간", "C. 결함 수와 테스트 케이스 수", "D. 코드 복잡도와 코드 크기"], "answer": "A", "explanation": "리스크는 발생 가능성(Likelihood)과 결함 발생 시 영향도(Impact)의 곱으로 결정된다."}, {"question": "제품 리스크(Product Risk)에 해당하는 것은?", "options": ["A. 테스트 일정 지연", "B. 테스트 인력 부족", "C. 소프트웨어 기능 장애", "D. 테스트 도구 미확보"], "answer": "C", "explanation": "제품 리스크는 소프트웨어 자체의 품질과 관련된 리스크로, 기능 장애, 성능 문제, 보안 취약점 등이 해당된다."}, {"question": "프로젝트 리스크(Project Risk)에 해당하는 것은?", "options": ["A. 소프트웨어 성능 저하", "B. 데이터 손실 위험", "C. 테스트 자원 및 인력 부족", "D. 기능 오작동"], "answer": "C", "explanation": "프로젝트 리스크는 프로젝트 관리와 관련된 리스크로, 자원 부족, 일정 지연, 범위 변경 등이 해당된다."}, {"question": "테스트 추정 기법 중 전문가의 경험에 의존하는 기법은?", "options": ["A. 기능 점수 분석", "B. 전문가 판단(Expert Judgment)", "C. PERT", "D. 와이드밴드 델파이"], "answer": "B", "explanation": "전문가 판단은 경험이 풍부한 전문가의 지식을 활용하여 테스트 노력을 추정하는 방법이다."}, {"question": "테스트 모니터링과 제어에서 테스트 진행 상황을 파악하기 위해 사용하는 지표가 아닌 것은?", "options": ["A. 결함 발견율", "B. 테스트 케이스 실행률", "C. 코드 커버리지", "D. 개발자 경력"], "answer": "D", "explanation": "테스트 모니터링 지표로는 결함 발견율, 테스트 케이스 실행률, 코드 커버리지, 잔여 결함 수 등이 사용된다."}, {"question": "IEEE 829에서 정의하는 테스트 문서가 아닌 것은?", "options": ["A. 테스트 계획서", "B. 테스트 케이스 명세서", "C. 테스트 결함 수정서", "D. 테스트 요약 보고서"], "answer": "C", "explanation": "IEEE 829는 테스트 계획서, 테스트 설계 명세서, 테스트 케이스 명세서, 테스트 절차 명세서, 테스트 결과 보고서 등을 정의한다."}, {"question": "결함 보고서(Defect Report)에 포함되어야 하는 내용이 아닌 것은?", "options": ["A. 결함 ID 및 제목", "B. 재현 절차", "C. 개발자 연락처", "D. 심각도(Severity)"], "answer": "C", "explanation": "결함 보고서에는 결함 ID, 제목, 재현 절차, 심각도, 우선순위, 환경 정보, 스크린샷 등이 포함된다."}, {"question": "결함 심각도(Defect Severity)와 우선순위(Priority)에 관한 설명으로 올바른 것은?", "options": ["A. 심각도가 높으면 항상 우선순위도 높다", "B. 심각도와 우선순위는 항상 일치한다", "C. 심각도와 우선순위는 서로 독립적으로 다를 수 있다", "D. 우선순위는 기술적 관점에서 결정된다"], "answer": "C", "explanation": "심각도는 기술적 영향도이고, 우선순위는 비즈니스 관점의 수정 순서이다. 예를 들어 회사 로고 오타는 심각도는 낮지만 우선순위가 높을 수 있다."}, {"question": "탐색적 테스팅(Exploratory Testing)에 대한 설명으로 가장 올바른 것은?", "options": ["A. 테스트 계획 없이 무작위로 수행하는 테스팅", "B. 테스트 설계와 실행을 동시에 수행하며 학습을 통해 테스트를 발전시키는 방법", "C. 자동화 테스팅의 일종이다", "D. 항상 비숙련자가 수행하는 테스팅이다"], "answer": "B", "explanation": "탐색적 테스팅은 테스터의 지식과 경험을 바탕으로 테스트 설계와 실행을 동시에 수행하며, 시간 제한 세션(Time-boxed Session) 방식으로 이루어진다."}, {"question": "애드혹 테스팅(Ad-hoc Testing)의 특징으로 올바른 것은?", "options": ["A. 철저한 문서화가 이루어진다", "B. 명확한 테스트 계획이 있다", "C. 문서 없이 직관과 경험으로 수행한다", "D. 자동화 도구를 반드시 사용한다"], "answer": "C", "explanation": "애드혹 테스팅은 사전 계획 없이 테스터의 직관과 경험에 의존하여 비공식적으로 수행하는 테스팅이다."}, {"question": "소프트웨어 개발 생명주기(SDLC)에서 테스팅이 가장 많은 비용을 절약할 수 있는 시점은?", "options": ["A. 코딩 이후", "B. 테스트 단계", "C. 요구사항 분석 단계", "D. 배포 이후"], "answer": "C", "explanation": "결함을 가장 조기에 발견하는 요구사항 분석 단계에서 결함을 수정하는 것이 가장 비용이 적게 든다."}, {"question": "테스트 독립성(Test Independence)의 장점으로 올바른 것은?", "options": ["A. 개발자가 직접 테스트하면 더 효율적이다", "B. 독립적인 테스터는 개발자의 가정과 편견에서 벗어나 결함을 발견할 가능성이 높다", "C. 독립적인 테스터는 항상 외부 업체여야 한다", "D. 독립적인 테스팅은 비용이 저렴하다"], "answer": "B", "explanation": "독립적인 테스터는 개발자의 선입견이나 가정의 영향을 받지 않아 결함을 더 잘 발견할 수 있다."}, {"question": "형상 관리(Configuration Management)가 테스팅에서 중요한 이유는?", "options": ["A. 테스트 케이스 자동 생성을 위해", "B. 테스트 대상 소프트웨어 버전과 테스트 환경을 관리하여 재현성을 보장하기 위해", "C. 테스트 비용 절감을 위해", "D. 테스터 업무 분배를 위해"], "answer": "B", "explanation": "형상 관리를 통해 테스트 대상 소프트웨어의 버전, 테스트 환경, 테스트 산출물을 관리하여 결함 재현 및 추적이 가능하다."}, {"question": "다음 중 기능 테스팅(Functional Testing)의 예가 아닌 것은?", "options": ["A. 로그인 기능 테스트", "B. 결제 프로세스 테스트", "C. 응답 시간 측정 테스트", "D. 데이터 검색 기능 테스트"], "answer": "C", "explanation": "응답 시간 측정은 성능 테스팅(비기능 테스팅)에 해당하며, 나머지는 기능 테스팅이다."}, {"question": "비기능 테스팅(Non-functional Testing)에 해당하는 것은?", "options": ["A. 회원가입 기능 테스트", "B. 검색 기능 테스트", "C. 사용성(Usability) 테스트", "D. 파일 업로드 기능 테스트"], "answer": "C", "explanation": "비기능 테스팅에는 성능, 보안, 사용성, 신뢰성, 이식성 등이 포함된다."}, {"question": "UAT(User Acceptance Testing)의 주요 목적은?", "options": ["A. 코드의 단위 기능을 검증하는 것", "B. 시스템 간 인터페이스를 검증하는 것", "C. 사용자가 시스템을 수용할 수 있는지 확인하는 것", "D. 성능 요구사항을 검증하는 것"], "answer": "C", "explanation": "UAT는 최종 사용자 또는 고객이 시스템이 비즈니스 요구사항을 충족하는지 확인하는 인수 테스트이다."}, {"question": "알파 테스팅(Alpha Testing)에 대한 올바른 설명은?", "options": ["A. 선별된 외부 고객이 실제 환경에서 수행하는 테스트", "B. 개발 조직 내에서 제품 출시 전에 수행하는 테스트", "C. 자동화 도구를 이용한 테스트", "D. 무작위 입력값으로 수행하는 테스트"], "answer": "B", "explanation": "알파 테스트는 개발 조직 내부(개발사 현장)에서 수행하는 인수 테스트이다."}, {"question": "베타 테스팅(Beta Testing)에 대한 올바른 설명은?", "options": ["A. 개발자들이 수행하는 테스트", "B. 선별된 실제 사용자들이 실제 환경에서 수행하는 테스트", "C. 개발 환경에서 수행하는 테스트", "D. QA 팀이 수행하는 테스트"], "answer": "B", "explanation": "베타 테스트는 실제 사용자 환경에서 선별된 외부 고객이 수행하는 인수 테스트이다."}, {"question": "테스트 커버리지(Test Coverage)에 대한 설명으로 올바른 것은?", "options": ["A. 테스트에 소요된 총 시간", "B. 테스트에 의해 측정된 테스트 항목의 커버 정도", "C. 발견된 결함의 총 수", "D. 테스트 케이스의 총 수"], "answer": "B", "explanation": "테스트 커버리지는 테스트에 의해 얼마나 많은 테스트 항목(요구사항, 코드 라인, 분기 등)이 실행되었는지를 측정한 값이다."}, {"question": "소프트웨어 결함의 근본 원인(Root Cause)을 분석하는 이유는?", "options": ["A. 책임자를 찾기 위해", "B. 동일한 유형의 결함이 재발하지 않도록 예방하기 위해", "C. 테스트 케이스 수를 줄이기 위해", "D. 테스트 자동화를 위해"], "answer": "B", "explanation": "근본 원인 분석(RCA)은 결함의 원인을 파악하여 재발을 방지하고 프로세스를 개선하기 위한 것이다."}, {"question": "테스트 자동화의 장점으로 가장 올바른 것은?", "options": ["A. 모든 결함을 발견할 수 있다", "B. 초기 투자 없이 즉시 효과를 볼 수 있다", "C. 반복적인 테스트를 빠르고 일관되게 수행할 수 있다", "D. 테스터가 필요 없게 된다"], "answer": "C", "explanation": "테스트 자동화는 반복 테스트, 회귀 테스트, 부하 테스트 등에 효과적이며, 일관성 있는 실행과 빠른 실행이 가능하다."}, {"question": "테스트 자동화의 단점으로 올바른 것은?", "options": ["A. 수동 테스트보다 더 많은 결함을 발견하지 못할 수 있다", "B. 테스트 실행 속도가 느리다", "C. 일관성이 없다", "D. 야간 실행이 불가능하다"], "answer": "A", "explanation": "자동화 테스트는 명세된 것만 확인하므로, 탐색적으로 결함을 발견하는 수동 테스트보다 새로운 결함 발견에 한계가 있을 수 있다."}, {"question": "테스트 프로세스의 활동 순서로 올바른 것은?", "options": ["A. 테스트 계획 → 테스트 모니터링과 제어 → 테스트 분석 → 테스트 설계 → 테스트 구현 → 테스트 실행 → 테스트 완료", "B. 테스트 분석 → 테스트 계획 → 테스트 설계 → 테스트 실행 → 테스트 완료", "C. 테스트 설계 → 테스트 계획 → 테스트 분석 → 테스트 실행 → 테스트 완료", "D. 테스트 실행 → 테스트 계획 → 테스트 설계 → 테스트 분석 → 테스트 완료"], "answer": "A", "explanation": "ISTQB 테스트 프로세스: 계획 → 모니터링과 제어 → 분석 → 설계 → 구현 → 실행 → 완료"}, {"question": "테스트 조건(Test Condition)이란 무엇인가?", "options": ["A. 테스트를 수행하기 위한 하드웨어 환경", "B. 테스트될 수 있는 컴포넌트나 시스템의 특성, 기능 또는 설계 요소", "C. 테스트 케이스의 입력값", "D. 테스트 완료 기준"], "answer": "B", "explanation": "테스트 조건은 테스트 베이시스에서 도출된 테스트 가능한 항목으로, 테스트 케이스를 설계하기 위한 기준이 된다."}, {"question": "결함의 생명주기(Defect Life Cycle)에서 일반적인 상태 흐름으로 올바른 것은?", "options": ["A. 열림 → 할당 → 수정 중 → 수정 완료 → 재테스트 → 닫힘", "B. 발견 → 닫힘 → 재테스트 → 수정", "C. 수정 → 발견 → 닫힘 → 재테스트", "D. 할당 → 열림 → 닫힘 → 재테스트"], "answer": "A", "explanation": "결함 생명주기: 새로 발견(New) → 열림(Open) → 할당(Assigned) → 수정 중(In Progress) → 수정 완료(Fixed) → 재테스트(Retest) → 닫힘(Closed)"}, {"question": "테스팅에서 '독립성의 수준'이 높아질수록 발생할 수 있는 단점은?", "options": ["A. 결함을 더 적게 발견한다", "B. 개발팀과의 의사소통 단절 및 병목 현상이 발생할 수 있다", "C. 테스트 비용이 줄어든다", "D. 테스트 효과가 감소한다"], "answer": "B", "explanation": "독립성이 높아질수록 개발팀과의 단절, 방어적 태도 유발, 의사소통 오버헤드, 책임 회피 등의 문제가 발생할 수 있다."}, {"question": "소프트웨어 테스팅에서 '불가능한 경로(Infeasible Path)'란 무엇인가?", "options": ["A. 테스트하기 어려운 경로", "B. 실행 조건상 실제로 실행될 수 없는 경로", "C. 자동화할 수 없는 경로", "D. 문서화되지 않은 경로"], "answer": "B", "explanation": "불가능한 경로는 코드 상에 존재하지만 어떤 입력값에 의해서도 실제로 실행될 수 없는 경로이다."}, {"question": "다음 중 테스트 레벨의 종류에 해당하지 않는 것은?", "options": ["A. 단위(컴포넌트) 테스트", "B. 통합 테스트", "C. 인스펙션 테스트", "D. 시스템 테스트"], "answer": "C", "explanation": "테스트 레벨은 단위, 통합, 시스템, 인수 테스트이며, 인스펙션은 정적 리뷰 기법이다."}, {"question": "빅뱅 통합(Big Bang Integration)의 단점은?", "options": ["A. 비용이 많이 든다", "B. 결함 위치를 파악하기 어렵고 통합 문제 발견이 늦다", "C. 자동화가 어렵다", "D. 테스트 케이스 작성이 복잡하다"], "answer": "B", "explanation": "빅뱅 통합은 모든 모듈을 한 번에 통합하므로, 결함 발생 시 원인 추적이 어렵고 통합 문제를 조기에 발견하기 어렵다."}, {"question": "하향식 통합(Top-down Integration)에서 하위 모듈 대신 사용되는 것은?", "options": ["A. 드라이버(Driver)", "B. 스텁(Stub)", "C. 목(Mock)", "D. 해니스(Harness)"], "answer": "B", "explanation": "하향식 통합에서 아직 개발되지 않은 하위 모듈 대신 스텁(Stub)을 사용하여 테스트한다."}, {"question": "상향식 통합(Bottom-up Integration)에서 상위 모듈 대신 사용되는 것은?", "options": ["A. 스텁(Stub)", "B. 드라이버(Driver)", "C. 목(Mock)", "D. 페이크(Fake)"], "answer": "B", "explanation": "상향식 통합에서 아직 개발되지 않은 상위 모듈 대신 드라이버(Driver)를 사용하여 하위 모듈을 호출하고 테스트한다."}, {"question": "테스트 하네스(Test Harness)란 무엇인가?", "options": ["A. 테스트 결과 분석 도구", "B. 테스트 실행을 지원하는 도구나 환경의 집합", "C. 테스트 케이스 관리 시스템", "D. 결함 추적 시스템"], "answer": "B", "explanation": "테스트 하네스는 단위 또는 통합 테스트를 수행하기 위해 필요한 테스트 드라이버, 스텁, 도구, 라이브러리 등의 환경이다."}, {"question": "테스팅의 심리학적 측면에서 개발자가 자신의 코드를 직접 테스트하기 어려운 이유는?", "options": ["A. 개발자는 테스트 기법을 모른다", "B. 개발자는 자신이 만든 가정과 오류를 그대로 가지고 있어 객관적 관찰이 어렵다", "C. 개발자는 테스트 도구를 사용하지 못한다", "D. 개발자는 시간이 없다"], "answer": "B", "explanation": "개발자는 코드를 작성할 때 가졌던 가정(잘못된 이해 포함)을 테스트 시에도 그대로 유지하는 경향이 있어 자신의 결함을 놓치기 쉽다."}, {"question": "결함(Defect)을 다른 말로 표현한 것 중 틀린 것은?", "options": ["A. 버그(Bug)", "B. 폴트(Fault)", "C. 장애(Failure)", "D. 결점(Flaw)"], "answer": "C", "explanation": "장애(Failure)는 결함이 실행될 때 나타나는 현상이며, 결함과는 다른 개념이다. 결함의 동의어는 버그, 폴트, 결점 등이다."}, {"question": "소프트웨어 테스팅에서 '확인 가능성(Testability)'이란 무엇인가?", "options": ["A. 테스트 케이스를 자동화할 수 있는 능력", "B. 요구사항이나 컴포넌트가 테스트될 수 있는 정도", "C. 테스터가 도구를 사용할 수 있는 능력", "D. 테스트 결과를 문서화할 수 있는 능력"], "answer": "B", "explanation": "테스트 가능성(Testability)은 소프트웨어나 요구사항이 테스트 가능한 상태로 작성되어 있는 정도를 나타낸다."}, {"question": "애자일 개발에서 테스팅의 특징으로 올바른 것은?", "options": ["A. 테스팅은 개발 완료 후에만 수행한다", "B. 테스터와 개발자는 엄격히 분리된다", "C. 테스팅은 전체 개발 주기에 걸쳐 지속적으로 수행된다", "D. 테스트 계획은 프로젝트 초기에 완벽하게 수립된다"], "answer": "C", "explanation": "애자일에서는 테스팅이 스프린트 내에서 개발과 함께 지속적으로 수행되며, 테스터와 개발자가 긴밀하게 협력한다."}, {"question": "TDD(Test-Driven Development)의 올바른 순서는?", "options": ["A. 코드 작성 → 테스트 작성 → 리팩토링", "B. 테스트 작성 → 코드 작성 → 리팩토링", "C. 리팩토링 → 테스트 작성 → 코드 작성", "D. 테스트 작성 → 리팩토링 → 코드 작성"], "answer": "B", "explanation": "TDD는 실패하는 테스트를 먼저 작성하고, 테스트를 통과하는 최소한의 코드를 작성한 후, 코드를 리팩토링하는 Red-Green-Refactor 사이클을 따른다."}, {"question": "테스트 피라미드(Test Pyramid)에서 가장 많은 수를 차지해야 하는 테스트는?", "options": ["A. UI 테스트", "B. 통합 테스트", "C. 단위 테스트", "D. 인수 테스트"], "answer": "C", "explanation": "테스트 피라미드에서 단위 테스트가 가장 많고 빠르며 비용이 적게 들고, UI 테스트가 가장 적어야 한다."}, {"question": "ISTQB에서 정의하는 테스팅의 7원칙 중 '결함은 모인다(Defects Cluster Together)'의 의미로 올바른 것은?", "options": ["A. 결함은 소수의 모듈이나 기능에 집중 분포한다", "B. 결함은 특정 개발자의 코드에만 존재한다", "C. 결함은 항상 UI에서 발생한다", "D. 결함은 테스트 초기에만 집중 발견된다"], "answer": "A", "explanation": "파레토 원칙(80/20)에 따라 대부분의 결함(80%)은 소수의 모듈(20%)에 집중되어 있는 경향이 있다."}, {"question": "소프트웨어 테스팅의 목표가 아닌 것은?", "options": ["A. 결함 발견", "B. 품질에 대한 신뢰성 제공", "C. 소프트웨어 완벽함 증명", "D. 의사결정을 위한 정보 제공"], "answer": "C", "explanation": "테스팅은 소프트웨어가 완벽하다는 것을 증명할 수 없으며, 결함이 없음을 보장하지도 않는다."}, {"question": "스모크 테스트(Smoke Test)의 목적으로 올바른 것은?", "options": ["A. 모든 기능을 상세하게 검증하기 위해", "B. 빌드가 추가 테스트를 진행할 수 있는 기본 수준의 품질인지 확인하기 위해", "C. 성능 문제를 발견하기 위해", "D. 보안 취약점을 발견하기 위해"], "answer": "B", "explanation": "스모크 테스트(빌드 검증 테스트)는 빌드의 핵심 기능이 동작하는지 빠르게 확인하여 추가 테스트 진행 여부를 결정한다."}, {"question": "테스트 실행 도구(Test Execution Tool)의 역할로 올바른 것은?", "options": ["A. 테스트 케이스를 자동으로 생성한다", "B. 테스트 케이스를 자동으로 실행하고 결과를 비교한다", "C. 결함을 자동으로 수정한다", "D. 테스트 계획을 자동으로 수립한다"], "answer": "B", "explanation": "테스트 실행 도구는 테스트 스크립트를 자동으로 실행하고 예상 결과와 실제 결과를 비교하여 결과를 보고한다."}, {"question": "성능 테스팅의 유형 중 시스템이 감당할 수 있는 최대 부하를 측정하는 테스트는?", "options": ["A. 스트레스 테스트(Stress Test)", "B. 부하 테스트(Load Test)", "C. 스파이크 테스트(Spike Test)", "D. 내구성 테스트(Endurance Test)"], "answer": "A", "explanation": "스트레스 테스트는 시스템의 한계(Breaking Point)를 찾기 위해 정상 부하 이상의 부하를 가하여 최대 처리 능력을 측정한다."}, {"question": "소프트웨어 품질 보증(SQA)과 소프트웨어 테스팅의 관계로 가장 올바른 것은?", "options": ["A. SQA와 테스팅은 동일한 개념이다", "B. 테스팅은 SQA의 한 부분이다", "C. SQA는 테스팅의 한 부분이다", "D. SQA와 테스팅은 서로 관련이 없다"], "answer": "B", "explanation": "소프트웨어 품질 보증(SQA)은 프로세스 전반에 걸친 품질 활동이며, 테스팅은 제품 품질 확인을 위한 SQA 활동의 일부이다."}, {"question": "검증(Verification)과 확인(Validation)의 차이로 올바른 것은?", "options": ["A. 검증은 '올바른 제품을 만들고 있는가', 확인은 '제품을 올바르게 만들고 있는가'를 확인한다", "B. 검증은 '제품을 올바르게 만들고 있는가', 확인은 '올바른 제품을 만들고 있는가'를 확인한다", "C. 검증과 확인은 동일한 개념이다", "D. 검증은 동적 테스팅이고 확인은 정적 테스팅이다"], "answer": "B", "explanation": "검증(Verification)은 명세에 따라 제품을 올바르게 만들고 있는지 확인(Are we building the product right?)하고, 확인(Validation)은 고객 요구에 맞는 올바른 제품을 만들고 있는지 확인(Are we building the right product?)한다."}, {"question": "모의 객체(Mock Object)를 사용하는 주요 목적은?", "options": ["A. 테스트 속도를 높이기 위해", "B. 실제 의존성을 대체하여 테스트 대상 단위를 격리하여 테스트하기 위해", "C. 코드 복잡도를 줄이기 위해", "D. 테스트 케이스를 자동 생성하기 위해"], "answer": "B", "explanation": "목(Mock) 객체는 실제 의존 컴포넌트(DB, 외부 API 등)를 대체하여 테스트 대상을 격리하고 독립적으로 테스트하기 위해 사용한다."}, {"question": "지속적 통합(CI, Continuous Integration)에서 테스팅의 역할로 올바른 것은?", "options": ["A. 배포 완료 후에만 테스트를 수행한다", "B. 코드 변경 시마다 자동으로 빌드하고 테스트하여 결함을 즉시 감지한다", "C. 테스팅은 CI와 관련이 없다", "D. 수동 테스트만 수행한다"], "answer": "B", "explanation": "CI에서는 코드가 커밋될 때마다 자동으로 빌드하고 테스트를 실행하여 결함을 빠르게 발견하고 피드백을 제공한다."}, {"question": "테스트 설계 기법 중 경험 기반 기법에 해당하는 것은?", "options": ["A. 동등 분할(Equivalence Partitioning)", "B. 탐색적 테스팅(Exploratory Testing)", "C. 상태 전이 테스팅(State Transition Testing)", "D. 구문 커버리지(Statement Coverage)"], "answer": "B", "explanation": "경험 기반 기법에는 탐색적 테스팅, 오류 추측(Error Guessing), 체크리스트 기반 테스팅이 포함된다."}, {"question": "결함 추측(Error Guessing) 기법에 대한 설명으로 올바른 것은?", "options": ["A. 명세서를 기반으로 체계적으로 테스트 케이스를 도출한다", "B. 코드 구조를 분석하여 테스트 경로를 도출한다", "C. 테스터의 경험과 직관을 바탕으로 오류가 발생할 것 같은 부분을 테스트한다", "D. 모든 입력값 조합을 테스트한다"], "answer": "C", "explanation": "오류 추측은 테스터의 경험과 직관을 바탕으로 시스템에서 오류가 발생할 가능성이 높은 부분에 집중하여 테스트하는 경험 기반 기법이다."}, {"question": "소프트웨어 테스팅에서 '재현성(Reproducibility)'이 중요한 이유는?", "options": ["A. 테스트 속도를 높이기 위해", "B. 결함을 안정적으로 다시 발생시켜 원인을 분석하고 수정을 검증하기 위해", "C. 테스트 케이스 수를 줄이기 위해", "D. 테스터의 업무 부담을 줄이기 위해"], "answer": "B", "explanation": "결함의 재현성은 개발자가 결함을 확인하고 수정하며 수정 검증을 위해 필수적이다."}, {"question": "호환성 테스팅(Compatibility Testing)에서 테스트하는 항목이 아닌 것은?", "options": ["A. 다양한 운영체제에서의 동작", "B. 다양한 브라우저에서의 동작", "C. 소프트웨어의 알고리즘 복잡도", "D. 다양한 디바이스에서의 동작"], "answer": "C", "explanation": "호환성 테스팅은 다양한 OS, 브라우저, 디바이스, 소프트웨어 버전 환경에서의 동작을 테스트하며, 알고리즘 복잡도는 해당되지 않는다."}, {"question": "보안 테스팅(Security Testing)의 주요 목적은?", "options": ["A. 시스템 성능을 측정하기 위해", "B. 인가되지 않은 접근이나 데이터 유출 등 보안 취약점을 발견하기 위해", "C. 기능 요구사항 충족 여부를 확인하기 위해", "D. 사용자 인터페이스의 편의성을 평가하기 위해"], "answer": "B", "explanation": "보안 테스팅은 인증, 권한, 기밀성, 무결성 등 보안 요구사항 충족 여부와 취약점을 발견하기 위해 수행한다."}, {"question": "내구성 테스트(Endurance Test/Soak Test)의 목적으로 올바른 것은?", "options": ["A. 최대 부하를 측정하기 위해", "B. 장시간 운영 시 메모리 누수 등의 문제를 발견하기 위해", "C. 갑작스러운 부하 증가 처리 능력을 측정하기 위해", "D. 응답 시간을 측정하기 위해"], "answer": "B", "explanation": "내구성(Soak) 테스트는 시스템이 장시간 동안 안정적으로 운영되는지 확인하며, 주로 메모리 누수나 리소스 고갈 등을 탐지한다."}, {"question": "사용성 테스팅(Usability Testing)에서 주로 평가하는 것은?", "options": ["A. 시스템 처리 속도", "B. 소프트웨어 보안", "C. 사용자가 시스템을 쉽고 효율적으로 사용할 수 있는지", "D. 코드 품질"], "answer": "C", "explanation": "사용성 테스팅은 실제 사용자가 시스템을 직관적으로 이해하고 효율적으로 사용할 수 있는지를 평가한다."}, {"question": "접근성 테스팅(Accessibility Testing)이 검증하는 것은?", "options": ["A. 소프트웨어의 성능", "B. 장애인을 포함한 모든 사용자가 소프트웨어를 사용할 수 있는지", "C. 소프트웨어의 보안", "D. 다양한 언어 지원 여부"], "answer": "B", "explanation": "접근성 테스팅은 시각, 청각, 운동 장애 등을 가진 사용자를 포함하여 모든 사용자가 소프트웨어를 사용할 수 있도록 WCAG 등의 기준을 충족하는지 검증한다."}, {"question": "이식성 테스팅(Portability Testing)에서 확인하는 것은?", "options": ["A. 시스템이 다른 환경에서도 동작할 수 있는지", "B. 시스템의 응답 시간", "C. 시스템의 보안", "D. 시스템의 기능 완전성"], "answer": "A", "explanation": "이식성 테스팅은 소프트웨어가 다른 하드웨어, OS, 소프트웨어 환경으로 이전될 때도 올바르게 동작하는지 확인한다."}, {"question": "테스트 관리자(Test Manager)의 주요 역할이 아닌 것은?", "options": ["A. 테스트 계획 수립", "B. 테스트 자원 및 일정 관리", "C. 테스트 케이스 상세 설계", "D. 테스트 진행 모니터링 및 보고"], "answer": "C", "explanation": "테스트 케이스 상세 설계는 테스트 분석가/테스터의 역할이며, 테스트 관리자는 계획, 자원 관리, 모니터링, 보고가 주 역할이다."}, {"question": "결함 밀도(Defect Density)를 계산하는 공식으로 올바른 것은?", "options": ["A. 결함 수 / 테스트 케이스 수", "B. 결함 수 / 소프트웨어 규모(LOC 또는 기능 점수)", "C. 결함 수 / 테스터 수", "D. 결함 수 / 테스트 시간"], "answer": "B", "explanation": "결함 밀도 = 발견된 결함 수 / 소프트웨어 규모(코드 라인 수 또는 기능 점수). 품질 지표로 활용된다."}, {"question": "번다운 차트(Burndown Chart)를 테스트에 적용할 때 나타내는 것은?", "options": ["A. 남은 결함 수의 감소 추이", "B. 테스트 케이스 실행 속도", "C. 코드 커버리지 증가 추이", "D. 테스터 수 변화"], "answer": "A", "explanation": "테스트 번다운 차트는 시간에 따라 남은 결함이나 테스트 케이스가 감소하는 추이를 시각적으로 표현한다."}, {"question": "소프트웨어 테스팅에서 '테스트 가능한 요구사항'의 특성으로 올바른 것은?", "options": ["A. 모호하고 해석의 여지가 있어야 한다", "B. 측정 가능하고 명확하며 구체적이어야 한다", "C. 가능한 한 간결해야 한다", "D. 개발자가 이해하기 쉬운 기술적 언어로 작성되어야 한다"], "answer": "B", "explanation": "테스트 가능한 요구사항은 명확(Clear), 완전(Complete), 일관(Consistent), 측정 가능(Measurable), 실현 가능(Achievable), 추적 가능(Traceable)해야 한다."}, {"question": "테스트 전략(Test Strategy)과 테스트 계획(Test Plan)의 차이로 올바른 것은?", "options": ["A. 테스트 전략과 테스트 계획은 동일하다", "B. 테스트 전략은 조직 수준의 일반적 테스트 접근법이고, 테스트 계획은 특정 프로젝트의 구체적 계획이다", "C. 테스트 계획이 테스트 전략보다 더 상위 수준이다", "D. 테스트 전략은 테스트 계획 없이도 사용될 수 없다"], "answer": "B", "explanation": "테스트 전략은 조직 수준의 테스트 접근 방법을 정의하고, 테스트 계획은 특정 프로젝트에 대한 구체적인 테스트 활동을 계획한다."}, {"question": "데브옵스(DevOps) 환경에서 테스팅의 특징으로 가장 올바른 것은?", "options": ["A. 테스팅은 배포 후에만 수행한다", "B. 테스팅은 개발, 운영과 통합되어 자동화를 통해 지속적으로 수행된다", "C. 테스터와 개발자는 완전히 분리된다", "D. 테스트 자동화는 필요 없다"], "answer": "B", "explanation": "DevOps 환경에서는 CI/CD 파이프라인을 통해 테스팅이 자동화되어 개발-테스트-배포 사이클에 통합된다."}, {"question": "페어 테스팅(Pair Testing)에 대한 설명으로 올바른 것은?", "options": ["A. 두 개의 시스템을 동시에 테스트하는 방법", "B. 두 명의 테스터 또는 테스터와 개발자가 함께 협력하여 테스트하는 방법", "C. 두 가지 테스트 기법을 동시에 사용하는 방법", "D. 자동화 테스트와 수동 테스트를 함께 수행하는 방법"], "answer": "B", "explanation": "페어 테스팅은 두 명이 함께 테스트를 수행하는 방법으로, 지식 공유와 즉각적인 피드백이 가능하다."}, {"question": "테스트 요약 보고서(Test Summary Report)에 포함되어야 하는 내용이 아닌 것은?", "options": ["A. 테스트 실행 결과 요약", "B. 발견된 결함 현황", "C. 소스 코드 복잡도 분석", "D. 미해결 리스크 및 권고사항"], "answer": "C", "explanation": "테스트 요약 보고서에는 테스트 범위, 실행 결과, 결함 현황, 커버리지, 미해결 사항, 권고사항 등이 포함되며 소스 코드 복잡도 분석은 해당되지 않는다."}, {"question": "GUI 테스팅(Graphical User Interface Testing)에서 확인하는 항목이 아닌 것은?", "options": ["A. 버튼, 링크, 폼 등 UI 요소 동작", "B. 화면 레이아웃 및 디자인 일관성", "C. 데이터베이스 쿼리 최적화", "D. 내비게이션 흐름"], "answer": "C", "explanation": "GUI 테스팅은 사용자 인터페이스 요소의 동작, 레이아웃, 디자인, 내비게이션 등을 검증하며, DB 쿼리 최적화는 해당되지 않는다."}, {"question": "소프트웨어 품질 비용(Cost of Quality) 중 '결함 예방 비용'에 해당하는 것은?", "options": ["A. 결함 수정 비용", "B. 테스트 수행 비용", "C. 교육 훈련 및 프로세스 개선 비용", "D. 고객 불만 처리 비용"], "answer": "C", "explanation": "예방 비용은 결함 발생을 사전에 막기 위한 교육, 훈련, 프로세스 개선, 도구 도입 등의 비용이다."}, {"question": "회귀 테스트(Regression Test) 자동화가 효과적인 이유는?", "options": ["A. 새로운 결함을 탐색하는 데 우수하다", "B. 반복적으로 동일한 테스트를 수행해야 하므로 자동화에 적합하다", "C. 탐색적 테스팅에 활용하기 좋다", "D. 복잡한 사용자 시나리오 테스트에 유리하다"], "answer": "B", "explanation": "회귀 테스트는 동일한 테스트를 반복적으로 수행하므로 자동화하면 비용과 시간을 절감하고 일관성을 유지할 수 있다."}, {"question": "테스트 종료 기준(Exit Criteria)의 예로 가장 적절한 것은?", "options": ["A. 테스터가 더 이상 할 일이 없을 때", "B. 정해진 테스트 커버리지 달성 및 심각한 미해결 결함 없음", "C. 예산이 소진되었을 때", "D. 개발자가 모든 코드를 완성했을 때"], "answer": "B", "explanation": "종료 기준은 목표 커버리지 달성, 심각 결함 수 허용 범위 이하, 모든 High Priority 테스트 케이스 실행 등 측정 가능한 기준으로 정의되어야 한다."}, {"question": "소프트웨어 테스팅에서 '오류 주입(Fault Injection)'의 목적은?", "options": ["A. 결함을 의도적으로 삽입하여 결함 탐지 능력을 평가하기 위해", "B. 소프트웨어에 바이러스를 주입하기 위해", "C. 코드 복잡도를 높이기 위해", "D. 테스트 케이스 수를 늘리기 위해"], "answer": "A", "explanation": "오류 주입(뮤테이션 테스팅 포함)은 의도적으로 결함을 삽입하여 테스트 케이스가 해당 결함을 발견할 수 있는지 테스트의 효과성을 평가한다."}, {"question": "전통적 폭포수 모델에서 테스트 계획을 수립하는 가장 적절한 시점은?", "options": ["A. 코딩이 완료된 후", "B. 시스템 테스트 직전", "C. 요구사항 분석 단계부터", "D. 인수 테스트 전"], "answer": "C", "explanation": "조기 테스팅 원칙에 따라 테스트 계획은 요구사항 분석 단계부터 시작하는 것이 최적이다."}, {"question": "테스트 자동화 도입 시 고려해야 할 사항으로 적절하지 않은 것은?", "options": ["A. 초기 투자 비용 및 ROI(투자 대비 효과)", "B. 자동화 가능한 테스트 유형 선정", "C. 테스트 스크립트 유지보수 부담", "D. 자동화 도입 후 테스터 전원 해고 계획"], "answer": "D", "explanation": "자동화 도입 시 ROI, 자동화 적합 테스트 유형, 유지보수 부담, 도구 선정 등을 고려해야 하며, 테스터는 탐색적 테스팅 등에서 여전히 필요하다."}, {"question": "소프트웨어 테스팅에서 '테스트 가능성(Testability)'을 높이기 위한 방법으로 올바른 것은?", "options": ["A. 요구사항을 최대한 포괄적으로 작성한다", "B. 요구사항을 구체적이고 측정 가능하게 작성하고, 관찰 가능한 출력을 설계한다", "C. 테스트를 최대한 늦게 시작한다", "D. 테스트 케이스 수를 최소화한다"], "answer": "B", "explanation": "테스트 가능성을 높이려면 요구사항을 명확하고 측정 가능하게 작성하고, 모듈 간 결합도를 낮추며, 관찰 가능한 출력과 제어 가능한 입력을 설계해야 한다."}],unit2:[{"question": "동등 분할(Equivalence Partitioning) 기법에서 유효 동등 클래스와 무효 동등 클래스를 나누는 주요 목적은 무엇인가?", "options": ["A. 테스트 케이스 수를 늘리기 위해", "B. 유사한 처리를 하는 입력 집합을 대표값으로 테스트하여 효율성을 높이기 위해", "C. 경계값만을 테스트하기 위해", "D. 모든 조합을 테스트하기 위해"], "answer": "B", "explanation": "동등 분할은 유사한 방식으로 처리될 것으로 예상되는 입력값들을 그룹(클래스)으로 나누고, 각 클래스의 대표값 하나만으로 테스트하여 테스트 효율성을 높이는 기법이다."}, {"question": "경계값 분석(Boundary Value Analysis)에서 2-값 경계값 분석을 적용할 때 경계값 100에 대해 선택하는 테스트 값은?", "options": ["A. 100만 선택", "B. 99와 100 선택", "C. 100과 101 선택", "D. 99, 100, 101 모두 선택"], "answer": "C", "explanation": "2-값 경계값 분석에서는 경계값 자체와 그 바로 다음 값(경계값+1)을 선택한다. 경계값 100에 대해 100과 101을 선택한다."}, {"question": "경계값 분석에서 3-값 경계값 분석을 적용할 때 경계값 50에 대해 선택하는 테스트 값은?", "options": ["A. 50만 선택", "B. 49와 50 선택", "C. 50과 51 선택", "D. 49, 50, 51 모두 선택"], "answer": "D", "explanation": "3-값 경계값 분석에서는 경계값(50), 경계값-1(49), 경계값+1(51) 총 3개의 값을 선택한다."}, {"question": "결정 테이블 테스팅(Decision Table Testing)에서 가능한 조건 조합의 수는 조건이 N개일 때 최대 몇 개인가? (각 조건이 참/거짓 두 가지 상태를 가질 때)", "options": ["A. N", "B. 2N", "C. 2^N", "D. N^2"], "answer": "C", "explanation": "각 조건이 참/거짓 두 가지 상태를 가질 때, N개의 조건에 대한 가능한 조합 수는 2^N이다."}, {"question": "상태 전이 테스팅(State Transition Testing)에서 0-스위치 커버리지란 무엇인가?", "options": ["A. 모든 전이를 최소 한 번 이상 테스트", "B. 모든 상태를 최소 한 번 이상 테스트", "C. 연속된 두 전이를 모두 테스트", "D. 연속된 세 전이를 모두 테스트"], "answer": "A", "explanation": "0-스위치 커버리지는 모든 유효한 전이(transition)를 최소 한 번 이상 실행하는 것을 목표로 한다."}, {"question": "유즈케이스 테스팅(Use Case Testing)의 주요 목적은?", "options": ["A. 코드의 내부 로직을 검증", "B. 사용자와 시스템 간의 상호작용 시나리오를 기반으로 테스트", "C. 경계값을 검증", "D. 성능을 측정"], "answer": "B", "explanation": "유즈케이스 테스팅은 사용자(행위자)와 시스템 간의 상호작용을 기술한 유즈케이스를 기반으로 테스트 케이스를 도출하여 실제 사용 시나리오를 검증한다."}, {"question": "구문 커버리지(Statement Coverage) 100% 달성이 의미하는 것은?", "options": ["A. 모든 분기를 테스트", "B. 모든 실행 가능한 구문을 최소 한 번 실행", "C. 모든 경로를 테스트", "D. 모든 조건을 테스트"], "answer": "B", "explanation": "구문 커버리지 100%는 소스 코드의 실행 가능한 모든 구문이 최소 한 번 이상 실행되었음을 의미한다."}, {"question": "결정 커버리지(Decision Coverage)에서 측정하는 것은?", "options": ["A. 실행된 구문의 비율", "B. 각 결정 포인트에서 참과 거짓 결과가 모두 테스트된 비율", "C. 실행된 경로의 비율", "D. 테스트된 조건의 비율"], "answer": "B", "explanation": "결정 커버리지(=분기 커버리지)는 각 결정 포인트(if, while 등)에서 참(True)과 거짓(False) 결과가 모두 실행된 비율을 측정한다."}, {"question": "MC/DC(Modified Condition/Decision Coverage)의 특징으로 옳은 것은?", "options": ["A. 각 조건이 결정 결과에 독립적으로 영향을 미침을 보인다", "B. 모든 가능한 조합을 테스트한다", "C. 단순 구문 커버리지와 동일하다", "D. 경계값만을 테스트한다"], "answer": "A", "explanation": "MC/DC는 각 개별 조건이 전체 결정 결과에 독립적으로 영향을 미친다는 것을 보여야 한다. 항공 소프트웨어 등 안전 필수 시스템에서 많이 요구된다."}, {"question": "탐색적 테스팅(Exploratory Testing)의 핵심 개념으로 옳은 것은?", "options": ["A. 사전에 모든 테스트 케이스를 문서화한 후 실행", "B. 테스트 학습, 설계, 실행을 동시에 수행", "C. 코드 구조를 기반으로 테스트 설계", "D. 경계값만을 집중적으로 테스트"], "answer": "B", "explanation": "탐색적 테스팅은 테스트 학습, 테스트 설계, 테스트 실행을 동시에 수행하며, 테스터의 경험과 직관을 활용하는 경험 기반 기법이다."}, {"question": "오류 추정(Error Guessing) 기법의 설명으로 옳은 것은?", "options": ["A. 명세서를 기반으로 체계적으로 테스트 케이스를 도출", "B. 테스터의 경험과 직관으로 오류가 발생할 가능성이 있는 곳을 예측하여 테스트", "C. 코드 커버리지를 100% 달성하기 위한 기법", "D. 성능 테스트를 위한 기법"], "answer": "B", "explanation": "오류 추정은 테스터의 경험, 지식, 직관을 바탕으로 소프트웨어에서 오류가 발생할 가능성이 높은 부분을 예측하여 테스트하는 경험 기반 기법이다."}, {"question": "블랙박스 테스트 기법의 특징으로 옳은 것은?", "options": ["A. 내부 코드 구조를 기반으로 테스트 케이스를 설계", "B. 소프트웨어의 기능 명세를 기반으로 테스트 케이스를 설계", "C. 코드 커버리지를 측정하는 데 사용", "D. 개발자만 수행할 수 있는 테스트"], "answer": "B", "explanation": "블랙박스 테스트(명세 기반 테스트)는 내부 구조를 보지 않고 소프트웨어의 기능 명세, 요구사항을 기반으로 테스트 케이스를 설계한다."}, {"question": "화이트박스 테스트 기법의 다른 명칭으로 옳은 것은?", "options": ["A. 명세 기반 테스트", "B. 경험 기반 테스트", "C. 구조 기반 테스트", "D. 기능 기반 테스트"], "answer": "C", "explanation": "화이트박스 테스트는 소프트웨어의 내부 구조(코드, 아키텍처 등)를 기반으로 테스트 케이스를 설계하므로 구조 기반 테스트라고도 한다."}, {"question": "동등 분할 기법에서 입력 범위가 1~100인 경우 올바른 무효 동등 클래스는?", "options": ["A. 1~100", "B. 50~75", "C. 0 이하, 101 이상", "D. 1~50, 51~100"], "answer": "C", "explanation": "유효 범위(1~100) 외부의 값인 0 이하와 101 이상이 무효 동등 클래스가 된다."}, {"question": "페어와이즈 테스팅(Pairwise Testing)의 목적은?", "options": ["A. 모든 가능한 입력 조합을 테스트", "B. 임의의 두 파라미터 간의 조합을 모두 커버", "C. 경계값만을 테스트", "D. 단일 파라미터의 동등 분할을 수행"], "answer": "B", "explanation": "페어와이즈 테스팅(=올페어 테스팅)은 임의의 두 파라미터 간의 모든 조합이 적어도 한 번씩 테스트되도록 테스트 케이스를 최소화하는 기법이다."}, {"question": "경로 커버리지(Path Coverage) 100% 달성이 어려운 이유는?", "options": ["A. 경로 수가 너무 적기 때문", "B. 루프가 포함된 경우 이론적으로 무한한 경로가 존재할 수 있기 때문", "C. 구문 커버리지와 동일하기 때문", "D. 도구가 없기 때문"], "answer": "B", "explanation": "루프가 포함된 경우 반복 횟수에 따라 이론적으로 무한히 많은 경로가 생성될 수 있어 100% 경로 커버리지 달성은 현실적으로 불가능할 수 있다."}, {"question": "상태 전이 다이어그램에서 '전이(Transition)'란?", "options": ["A. 시스템의 정적 상태", "B. 이벤트에 의해 한 상태에서 다른 상태로 변하는 것", "C. 테스트 케이스의 집합", "D. 시스템의 초기 상태"], "answer": "B", "explanation": "전이(Transition)는 특정 이벤트나 조건에 의해 한 상태에서 다른 상태로 변화하는 것을 의미한다."}, {"question": "결정 테이블에서 '무관 조건(Don't Care)'이란?", "options": ["A. 반드시 참이어야 하는 조건", "B. 반드시 거짓이어야 하는 조건", "C. 해당 규칙의 결과에 영향을 미치지 않는 조건", "D. 아직 정의되지 않은 조건"], "answer": "C", "explanation": "무관 조건(Don't Care, -)은 해당 규칙(열)의 행동(결과)에 영향을 주지 않아 참이든 거짓이든 상관없는 조건이다."}, {"question": "조건 커버리지(Condition Coverage)와 결정 커버리지(Decision Coverage)의 관계로 옳은 것은?", "options": ["A. 조건 커버리지 100%이면 결정 커버리지도 반드시 100%이다", "B. 결정 커버리지 100%이면 조건 커버리지도 반드시 100%이다", "C. 조건 커버리지 100%여도 결정 커버리지가 100%가 아닐 수 있다", "D. 두 커버리지는 항상 동일하다"], "answer": "C", "explanation": "조건 커버리지는 각 개별 조건의 참/거짓을 다루지만 전체 결정의 결과를 보장하지 않는다. 따라서 조건 커버리지 100%여도 결정 커버리지가 100%가 되지 않을 수 있다."}, {"question": "원인-결과 그래프(Cause-Effect Graphing) 기법의 산출물은?", "options": ["A. 상태 전이 다이어그램", "B. 결정 테이블", "C. 유즈케이스 다이어그램", "D. 클래스 다이어그램"], "answer": "B", "explanation": "원인-결과 그래프 기법은 입력(원인)과 출력(결과) 간의 논리 관계를 그래프로 표현하고, 이를 결정 테이블로 변환하여 테스트 케이스를 도출한다."}, {"question": "다음 중 블랙박스 테스트 기법이 아닌 것은?", "options": ["A. 동등 분할", "B. 경계값 분석", "C. 조건/결정 커버리지", "D. 유즈케이스 테스팅"], "answer": "C", "explanation": "조건/결정 커버리지는 코드 내부 구조를 기반으로 하는 화이트박스 테스트 기법이다. 동등 분할, 경계값 분석, 유즈케이스 테스팅은 블랙박스 기법이다."}, {"question": "분류 트리 기법(Classification Tree Method)에서 '분류(Classification)'란?", "options": ["A. 테스트 결과를 합격/불합격으로 나누는 것", "B. 테스트 대상의 특성을 계층적으로 분류하는 것", "C. 결함을 심각도별로 분류하는 것", "D. 테스트 케이스를 우선순위별로 정렬하는 것"], "answer": "B", "explanation": "분류 트리 기법에서 분류는 테스트 대상의 특성(파라미터)을 트리 구조로 계층적으로 분류하는 것이다."}, {"question": "체크리스트 기반 테스팅의 특징으로 옳은 것은?", "options": ["A. 코드 커버리지를 정확히 측정할 수 있다", "B. 경험이나 표준에서 파생된 항목 목록을 사용하여 테스트한다", "C. 항상 자동화 도구를 사용해야 한다", "D. 명세서 없이는 수행할 수 없다"], "answer": "B", "explanation": "체크리스트 기반 테스팅은 경험이나 표준, 규정 등에서 파생된 확인 항목 목록을 사용하여 테스트를 수행하는 경험 기반 기법이다."}, {"question": "다음 중 화이트박스 테스트 기법에 해당하는 것은?", "options": ["A. 경계값 분석", "B. 동등 분할", "C. 데이터 흐름 테스팅", "D. 상태 전이 테스팅"], "answer": "C", "explanation": "데이터 흐름 테스팅은 변수의 정의(definition)와 사용(use) 경로를 분석하는 화이트박스(구조 기반) 테스트 기법이다."}, {"question": "구문 커버리지와 결정 커버리지의 관계로 옳은 것은?", "options": ["A. 구문 커버리지 100%이면 결정 커버리지도 반드시 100%이다", "B. 결정 커버리지 100%이면 구문 커버리지도 반드시 100%이다", "C. 두 커버리지는 항상 같다", "D. 서로 독립적이다"], "answer": "B", "explanation": "결정 커버리지 100%를 달성하면 구문 커버리지도 100%가 보장된다. 그러나 구문 커버리지 100%가 결정 커버리지 100%를 보장하지는 않는다."}, {"question": "상태 전이 테스팅에서 1-스위치 커버리지란?", "options": ["A. 모든 상태를 한 번씩 방문", "B. 모든 단일 전이를 한 번씩 실행", "C. 연속된 두 전이의 모든 유효한 쌍을 실행", "D. 모든 전이를 두 번씩 실행"], "answer": "C", "explanation": "1-스위치 커버리지는 연속된 두 전이(transition sequence of length 2)의 모든 유효한 쌍을 최소 한 번씩 실행하는 것을 목표로 한다."}, {"question": "경계값 분석을 적용할 때, 입력 범위가 10 이상 20 이하인 경우 경계값은?", "options": ["A. 10, 20", "B. 9, 10, 20, 21", "C. 10, 15, 20", "D. 9, 21"], "answer": "A", "explanation": "경계값 분석에서 경계값은 유효 범위의 최솟값(10)과 최댓값(20)이다. 2-값 분석에서는 여기에 +1/-1 값을 추가한다."}, {"question": "탐색적 테스팅의 세션 기반 접근법(Session-Based Test Management)에서 '세션(Session)'이란?", "options": ["A. 테스트 자동화 스크립트", "B. 정해진 시간 동안 특정 목표를 가지고 수행하는 중단 없는 테스트 시간", "C. 테스트 환경 설정 시간", "D. 테스트 결과 보고 시간"], "answer": "B", "explanation": "세션 기반 탐색적 테스팅에서 세션은 타임박스(time box)로 정해진 시간 동안 특정 헌장(charter)을 목표로 중단 없이 수행하는 테스트 시간이다."}, {"question": "동등 분할에서 출력값 기반 동등 클래스를 도출하는 것이 필요한 경우는?", "options": ["A. 입력값이 매우 많은 경우", "B. 특정 출력을 생성하는 입력 조건을 테스트해야 할 때", "C. 성능을 측정해야 할 때", "D. 코드 커버리지를 높여야 할 때"], "answer": "B", "explanation": "출력값 기반 동등 분할은 특정 결과나 출력값을 만들어 내는 입력 조건의 그룹을 테스트해야 할 때 유용하다."}, {"question": "결정 테이블 테스팅에서 '규칙(Rule)'이란?", "options": ["A. 테스트를 수행하는 절차", "B. 특정 조건 조합에 대응하는 행동(결과)의 집합", "C. 소프트웨어 개발 표준", "D. 테스트 케이스의 우선순위"], "answer": "B", "explanation": "결정 테이블에서 규칙(Rule)은 조건의 특정 조합에 따라 수행되어야 하는 행동(동작, 결과)의 집합을 의미하며 테이블의 열로 표현된다."}, {"question": "다음 중 경험 기반 테스트 기법에 해당하지 않는 것은?", "options": ["A. 오류 추정", "B. 탐색적 테스팅", "C. 체크리스트 기반 테스팅", "D. 동등 분할"], "answer": "D", "explanation": "동등 분할은 명세(기능)를 기반으로 하는 블랙박스 테스트 기법이다. 오류 추정, 탐색적 테스팅, 체크리스트 기반 테스팅은 경험 기반 기법이다."}, {"question": "MC/DC가 항공 소프트웨어 분야에서 요구되는 주요 이유는?", "options": ["A. 테스트 비용이 낮기 때문", "B. 안전 필수 시스템에서 각 조건이 독립적으로 결정에 영향을 미침을 증명해야 하기 때문", "C. 자동화하기 쉽기 때문", "D. 코드 커버리지가 낮아도 되기 때문"], "answer": "B", "explanation": "MC/DC는 DO-178B/C 등 항공 안전 표준에서 요구하며, 각 개별 조건이 독립적으로 결정 결과에 영향을 미친다는 것을 증명함으로써 안전성을 보장한다."}, {"question": "페어와이즈 테스팅의 이론적 근거는?", "options": ["A. 대부분의 결함은 단일 변수 또는 두 변수 간의 상호작용에서 발생한다", "B. 모든 조합을 테스트하는 것이 가장 효율적이다", "C. 경계값에서 결함이 가장 많이 발생한다", "D. 코드 커버리지가 높을수록 결함이 적다"], "answer": "A", "explanation": "연구에 따르면 대부분의 결함은 단일 변수의 오류 또는 두 변수 간의 상호작용 오류에서 발생한다. 페어와이즈 테스팅은 이를 기반으로 모든 2-way 조합을 커버한다."}, {"question": "데이터 흐름 테스팅에서 'def-use 쌍'이란?", "options": ["A. 함수의 정의와 호출 쌍", "B. 변수가 정의(할당)된 위치와 사용된 위치의 쌍", "C. 클래스 정의와 인스턴스 사용의 쌍", "D. 입력값과 출력값의 쌍"], "answer": "B", "explanation": "데이터 흐름 테스팅에서 def-use 쌍은 변수가 정의(값이 할당)된 위치와 해당 변수가 사용(참조)된 위치 간의 경로를 의미한다."}, {"question": "블랙박스 테스트 기법과 화이트박스 테스트 기법을 결합하는 방식은?", "options": ["A. 회귀 테스팅", "B. 회색 박스 테스팅(Grey Box Testing)", "C. 탐색적 테스팅", "D. 성능 테스팅"], "answer": "B", "explanation": "회색 박스 테스팅(Grey Box Testing)은 블랙박스 기법과 화이트박스 기법을 결합한 접근 방식으로, 내부 구조에 대한 부분적인 지식을 활용하여 테스트한다."}, {"question": "유즈케이스 테스팅에서 '기본 흐름(Basic Flow)'이란?", "options": ["A. 예외가 발생하는 시나리오", "B. 행위자가 목적을 달성하는 가장 일반적이고 성공적인 경로", "C. 시스템 오류 처리 흐름", "D. 가장 복잡한 시나리오"], "answer": "B", "explanation": "기본 흐름(Basic/Main Flow)은 행위자가 예외 없이 목적을 성공적으로 달성하는 가장 일반적인 경로를 의미한다. 대안 흐름이나 예외 흐름과 구분된다."}, {"question": "동등 분할을 숫자 범위 외에 적용할 수 있는 경우로 옳은 것은?", "options": ["A. 숫자 범위에만 적용 가능", "B. 문자열, 날짜, 파일 타입 등 다양한 입력 유형에 적용 가능", "C. 출력값에는 적용 불가", "D. 단일 값에만 적용 가능"], "answer": "B", "explanation": "동등 분할은 숫자 범위뿐만 아니라 문자열, 날짜, 시간, 객체, 파일 타입 등 다양한 입력 유형에도 적용 가능하다."}, {"question": "상태 전이 테스팅에서 '상태 표(State Table)'의 역할은?", "options": ["A. 코드 구조를 표현", "B. 현재 상태와 이벤트에 따른 다음 상태 및 행동을 표로 정리", "C. 테스트 케이스의 우선순위를 나열", "D. 테스트 결과를 기록"], "answer": "B", "explanation": "상태 표(State Table)는 현재 상태와 발생하는 이벤트(조건)의 조합에 따라 전이될 다음 상태와 수행되는 행동을 표 형식으로 정리한 것이다."}, {"question": "탐색적 테스팅의 '헌장(Charter)'이란?", "options": ["A. 회사 규정 문서", "B. 탐색적 테스팅 세션의 목표와 방향을 기술한 문서", "C. 테스트 결과 보고서", "D. 자동화 스크립트"], "answer": "B", "explanation": "탐색적 테스팅에서 헌장(Charter)은 세션의 목표, 범위, 수행할 테스트 방향을 간략히 기술한 문서로, 테스터에게 가이드를 제공한다."}, {"question": "조건/결정 커버리지(Condition/Decision Coverage)는 무엇을 측정하는가?", "options": ["A. 구문만 측정", "B. 개별 조건의 참/거짓과 전체 결정의 참/거짓을 모두 측정", "C. 경로만 측정", "D. 루프 횟수만 측정"], "answer": "B", "explanation": "조건/결정 커버리지는 각 개별 조건이 참/거짓으로 평가되고, 동시에 전체 결정의 결과도 참/거짓으로 평가되는 것을 모두 측정한다."}, {"question": "경계값 분석에서 내부 경계와 외부 경계의 차이는?", "options": ["A. 내부 경계는 유효 범위 내의 최솟/최댓값, 외부 경계는 유효 범위 바로 밖의 값", "B. 내부 경계는 코드 내부의 값, 외부 경계는 입력 양식의 값", "C. 차이 없이 같은 의미", "D. 내부 경계는 정수, 외부 경계는 실수"], "answer": "A", "explanation": "내부 경계(on-point)는 유효 범위의 최솟값과 최댓값이고, 외부 경계(off-point)는 유효 범위 바로 밖의 값(경계값+1 또는 경계값-1)이다."}, {"question": "결정 커버리지(Decision Coverage)는 분기 커버리지(Branch Coverage)와 어떤 관계인가?", "options": ["A. 완전히 다른 개념", "B. 결정 커버리지는 분기 커버리지보다 엄격하다", "C. 실질적으로 동일한 커버리지", "D. 분기 커버리지가 결정 커버리지보다 엄격하다"], "answer": "C", "explanation": "결정 커버리지와 분기 커버리지는 실질적으로 동일한 개념으로 혼용된다. 각 결정 포인트에서 참/거짓 결과가 모두 테스트되는 것을 측정한다."}, {"question": "다음 중 명세 기반 테스트 기법(블랙박스)의 장점은?", "options": ["A. 코드 커버리지를 정확히 측정할 수 있다", "B. 구현과 독립적으로 테스트 케이스를 조기에 작성할 수 있다", "C. 내부 로직을 완벽히 검증할 수 있다", "D. 모든 경로를 보장할 수 있다"], "answer": "B", "explanation": "블랙박스 테스트는 구현 코드 없이 명세나 요구사항만으로 테스트 케이스를 조기에 설계할 수 있어, 개발과 병행하여 테스트를 준비할 수 있다."}, {"question": "화이트박스 테스트 기법의 단점은?", "options": ["A. 요구사항 미구현을 발견하기 어렵다", "B. 코드가 필요 없다", "C. 경계값을 테스트할 수 없다", "D. 기능 명세가 없어도 된다"], "answer": "A", "explanation": "화이트박스 테스트는 구현된 코드를 기반으로 하므로 명세에는 있지만 코드에 구현되지 않은 기능(요구사항 미구현)을 발견하기 어렵다."}, {"question": "구조 기반 커버리지에서 일반적으로 가장 강력한(엄격한) 기준은?", "options": ["A. 구문 커버리지", "B. 결정 커버리지", "C. MC/DC", "D. 조건 커버리지"], "answer": "C", "explanation": "일반적인 구조 기반 커버리지 강도 순서는 구문 < 결정 < 조건/결정 < MC/DC < 경로 순이다. MC/DC는 조건 커버리지보다 엄격하면서 경로 커버리지보다 현실적이다."}, {"question": "오류 추정 기법에서 '결함 공격(Fault Attack)' 접근법은 무엇을 의미하는가?", "options": ["A. 시스템에 물리적 공격을 가하는 것", "B. 과거 경험에서 알려진 결함 유형 목록을 만들어 해당 영역을 집중 테스트하는 것", "C. 보안 취약점을 공격하는 것", "D. 자동화된 도구로 공격하는 것"], "answer": "B", "explanation": "결함 공격 접근법은 과거 프로젝트에서 발견된 결함이나 알려진 결함 유형 목록을 만들고, 이를 기반으로 유사한 결함이 있을 가능성이 높은 영역을 집중적으로 테스트하는 방법이다."}, {"question": "상태 전이 테스팅에서 무효 전이(Invalid Transition)를 테스트하는 목적은?", "options": ["A. 정상적인 기능을 검증하기 위해", "B. 허용되지 않는 이벤트나 전이에 대한 시스템의 처리를 검증하기 위해", "C. 성능을 측정하기 위해", "D. 코드 커버리지를 높이기 위해"], "answer": "B", "explanation": "무효 전이 테스팅은 특정 상태에서 발생해서는 안 되는 이벤트가 발생했을 때 시스템이 이를 적절히 거부하거나 처리하는지 검증한다."}, {"question": "페어와이즈 테스팅의 단점은?", "options": ["A. 3개 이상 변수 간의 상호작용 결함을 놓칠 수 있다", "B. 2개 변수 조합을 테스트하지 못한다", "C. 자동화할 수 없다", "D. 명세가 없으면 사용할 수 없다"], "answer": "A", "explanation": "페어와이즈 테스팅은 2-way 조합만 보장하므로, 3개 이상의 변수 간의 복잡한 상호작용에서 발생하는 결함은 발견하지 못할 수 있다."}, {"question": "결정 테이블 테스팅이 가장 효과적으로 적용되는 상황은?", "options": ["A. 단순한 순차 처리 로직", "B. 복잡한 비즈니스 규칙과 여러 조건의 조합에 따른 다른 결과", "C. 성능이 중요한 시스템", "D. 단일 입력, 단일 출력 시스템"], "answer": "B", "explanation": "결정 테이블 테스팅은 여러 조건의 조합에 따라 다른 행동이나 결과가 나타나는 복잡한 비즈니스 로직을 테스트할 때 가장 효과적이다."}, {"question": "동등 분할에서 각 동등 클래스에서 하나의 대표값만 선택하는 이유는?", "options": ["A. 테스트 시간이 부족해서", "B. 동일 클래스 내의 값들은 유사하게 처리되므로 하나의 값이 클래스 전체를 대표할 수 있다고 가정하기 때문", "C. 도구가 하나의 값만 지원하기 때문", "D. 표준 규정이기 때문"], "answer": "B", "explanation": "동등 분할의 핵심 가정은 동일 클래스 내의 값들은 소프트웨어에 의해 동일하게 처리된다는 것이다. 따라서 하나의 대표값이 클래스 전체 동작을 검증할 수 있다."}, {"question": "경계값 분석과 동등 분할의 관계로 옳은 것은?", "options": ["A. 완전히 독립적인 기법", "B. 경계값 분석은 동등 분할의 경계에서의 값을 보완적으로 테스트하는 기법", "C. 동등 분할이 경계값 분석보다 더 정확하다", "D. 두 기법은 항상 같은 결과를 낸다"], "answer": "B", "explanation": "경계값 분석은 동등 분할과 보완적으로 사용되며, 동등 클래스의 경계값(최솟값, 최댓값)에서 오류가 발생할 가능성이 높다는 원칙에 기반한다."}, {"question": "구문 커버리지(Statement Coverage) 측정 공식은?", "options": ["A. (실행된 결정 수 / 전체 결정 수) × 100", "B. (실행된 구문 수 / 전체 실행 가능 구문 수) × 100", "C. (테스트 케이스 수 / 전체 요구사항 수) × 100", "D. (발견된 결함 수 / 전체 결함 수) × 100"], "answer": "B", "explanation": "구문 커버리지 = (실행된 구문 수 / 전체 실행 가능한 구문 수) × 100으로 계산한다."}, {"question": "유즈케이스 테스팅에서 '대안 흐름(Alternative Flow)'은 무엇을 의미하는가?", "options": ["A. 기본 흐름의 동의어", "B. 기본 흐름 외의 다른 성공 경로 또는 예외 상황을 처리하는 흐름", "C. 시스템 오류 흐름", "D. 관리자 전용 흐름"], "answer": "B", "explanation": "대안 흐름(Alternative Flow)은 기본 흐름 외에 발생할 수 있는 다른 성공 경로나 예외 상황(예외 흐름)을 처리하는 흐름이다."}, {"question": "분류 트리 기법의 장점은?", "options": ["A. 코드 커버리지를 측정할 수 있다", "B. 복잡한 테스트 공간을 구조적으로 표현하고 조합 테스트 케이스를 체계적으로 도출할 수 있다", "C. 항상 모든 조합을 테스트한다", "D. 오직 숫자 입력에만 적용 가능하다"], "answer": "B", "explanation": "분류 트리 기법은 복잡한 테스트 대상의 입력 공간을 트리 형태로 구조화하여 체계적으로 표현하고, 다양한 조합의 테스트 케이스를 효율적으로 도출할 수 있다."}, {"question": "탐색적 테스팅이 형식적 테스팅보다 유리한 상황은?", "options": ["A. 요구사항이 완전하고 명확한 경우", "B. 명세가 불완전하거나 시간이 부족하며 테스터의 경험을 활용해야 할 때", "C. 규제 환경에서 모든 테스트를 문서화해야 할 때", "D. 코드 커버리지를 측정해야 할 때"], "answer": "B", "explanation": "탐색적 테스팅은 명세가 불완전하거나 부재하고, 일정이 촉박하거나 테스터의 창의성과 경험을 최대한 활용해야 할 때 특히 효과적이다."}, {"question": "원인-결과 그래프에서 'AND 관계'는 무엇을 의미하는가?", "options": ["A. 하나의 원인이 여러 결과를 낸다", "B. 여러 원인이 모두 참일 때 결과가 발생한다", "C. 여러 원인 중 하나만 참이어도 결과가 발생한다", "D. 원인과 결과가 반대이다"], "answer": "B", "explanation": "원인-결과 그래프에서 AND 관계는 연결된 모든 원인이 참(True)일 때만 결과가 참이 되는 논리적 관계를 의미한다."}, {"question": "소프트웨어 테스트 기법 중 구조 기반 기법의 입력은?", "options": ["A. 기능 명세서", "B. 소스 코드 또는 시스템 구조", "C. 사용자 시나리오", "D. 테스터의 경험"], "answer": "B", "explanation": "구조 기반(화이트박스) 테스트 기법은 소스 코드, 제어 흐름, 데이터 흐름 등 시스템의 내부 구조를 입력으로 테스트 케이스를 설계한다."}, {"question": "결정 커버리지에서 'if (A && B)' 구문을 100% 커버하려면 최소 몇 개의 테스트 케이스가 필요한가?", "options": ["A. 1개", "B. 2개", "C. 4개", "D. 8개"], "answer": "B", "explanation": "결정 커버리지는 전체 결정(A && B)이 참이 되는 경우와 거짓이 되는 경우를 각각 최소 한 번씩 실행하면 되므로 최소 2개의 테스트 케이스가 필요하다."}, {"question": "상태 전이 테스팅에서 '스닉 패스(Sneak Path)'란?", "options": ["A. 정상적인 전이 경로", "B. 설계상 허용되지 않는 전이가 실제로 발생하는 것", "C. 가장 빠른 전이 경로", "D. 초기화 경로"], "answer": "B", "explanation": "스닉 패스(Sneak Path)는 설계에서 허용되지 않아야 하는데 실제로는 발생하는 무효 전이를 의미하며, 보안 및 안전성 측면에서 중요한 테스트 대상이다."}, {"question": "블랙박스 테스트와 화이트박스 테스트의 적절한 조합 사용이 권장되는 주된 이유는?", "options": ["A. 각 기법이 서로 다른 종류의 결함을 발견하는 데 효과적이기 때문", "B. 표준에서 두 기법의 병행 사용을 규정하기 때문", "C. 비용을 절감하기 위해", "D. 자동화하기 쉽기 때문"], "answer": "A", "explanation": "블랙박스 기법은 요구사항/기능 관련 결함을 발견하는 데, 화이트박스 기법은 코드 로직 오류를 발견하는 데 각각 효과적이므로 함께 사용하면 더 많은 결함을 발견할 수 있다."}, {"question": "경계값 분석이 효과적인 이유는?", "options": ["A. 중간값에서 결함이 가장 많이 발생하기 때문", "B. 경계 근처에서 오류가 발생할 확률이 높다는 경험적 사실에 기반하기 때문", "C. 경계값은 항상 유효한 값이기 때문", "D. 자동화하기 가장 쉬운 기법이기 때문"], "answer": "B", "explanation": "경험적 연구에 따르면 프로그래머들이 경계 조건(≤, <, >, ≥)을 잘못 처리하는 경우가 많아 경계 근처에서 결함이 발생할 확률이 높다. 이것이 경계값 분석의 이론적 근거이다."}, {"question": "MC/DC에서 각 조건이 독립적으로 영향을 미친다는 것을 보이기 위해 필요한 최소 테스트 케이스 수는 N개의 조건이 있을 때?", "options": ["A. N", "B. N+1", "C. 2N", "D. 2^N"], "answer": "B", "explanation": "MC/DC는 N개의 조건이 있을 때 최소 N+1개의 테스트 케이스로 각 조건의 독립적 영향을 보일 수 있어, 2^N개가 필요한 완전 조건 조합 테스팅보다 훨씬 효율적이다."}, {"question": "유즈케이스 테스팅에서 도출하는 테스트 케이스의 유형으로 옳지 않은 것은?", "options": ["A. 기본 흐름 테스트", "B. 대안 흐름 테스트", "C. 예외 흐름 테스트", "D. 코드 커버리지 테스트"], "answer": "D", "explanation": "유즈케이스 테스팅은 기본 흐름, 대안 흐름, 예외 흐름을 기반으로 테스트 케이스를 도출한다. 코드 커버리지 테스트는 화이트박스 기법이다."}, {"question": "동등 분할에서 올바른 유효 동등 클래스 대표값 선택 기준은?", "options": ["A. 반드시 클래스의 중간값을 선택", "B. 반드시 클래스의 최솟값을 선택", "C. 클래스 내의 임의의 대표값을 선택", "D. 반드시 클래스의 최댓값을 선택"], "answer": "C", "explanation": "동등 분할에서는 해당 클래스를 대표하는 임의의 값을 선택한다. 이론적으로 클래스 내 어떤 값도 동일하게 처리되어야 하므로 특정 위치(중간, 최솟값 등)의 값이 반드시 필요하지 않다."}, {"question": "결정 테이블에서 '제한적 결정 테이블(Limited Entry Decision Table)'이란?", "options": ["A. 조건의 수가 제한된 결정 테이블", "B. 각 조건이 참(Y) 또는 거짓(N) 두 값만 가질 수 있는 결정 테이블", "C. 행동의 수가 제한된 결정 테이블", "D. 규칙의 수가 제한된 결정 테이블"], "answer": "B", "explanation": "제한적 결정 테이블(Limited Entry Decision Table)은 각 조건이 참(Y)과 거짓(N) 두 가지 값만 가질 수 있는 결정 테이블이다. 확장 결정 테이블(Extended Entry)은 조건이 여러 값을 가질 수 있다."}, {"question": "소프트웨어 테스트 기법을 분류하는 3가지 주요 범주는?", "options": ["A. 단위, 통합, 시스템 테스트", "B. 블랙박스, 화이트박스, 회색박스 테스트", "C. 명세 기반(블랙박스), 구조 기반(화이트박스), 경험 기반 테스트", "D. 정적, 동적, 자동화 테스트"], "answer": "C", "explanation": "ISTQB/CSTS에서 소프트웨어 테스트 기법은 명세 기반(블랙박스) 기법, 구조 기반(화이트박스) 기법, 경험 기반 기법의 3가지 범주로 분류된다."}, {"question": "데이터 흐름 테스팅에서 '변수 정의(Definition)'란?", "options": ["A. 변수를 선언하는 것", "B. 변수에 값이 할당되거나 초기화되는 위치", "C. 변수의 타입을 지정하는 것", "D. 변수를 출력하는 것"], "answer": "B", "explanation": "데이터 흐름 테스팅에서 정의(Definition)는 변수에 값이 할당되거나 초기화되는 코드 위치를 의미한다."}, {"question": "탐색적 테스팅에서 '시간박스(Time Box)'의 역할은?", "options": ["A. 테스트 도구의 종류", "B. 세션 시간을 고정하여 테스트 집중도와 관리를 개선", "C. 테스트 결과를 시간대별로 기록", "D. 성능 측정 단위"], "answer": "B", "explanation": "시간박스는 탐색적 테스팅 세션의 시간을 고정(일반적으로 90~120분)하여 테스터가 집중적으로 테스트하고, 관리자가 진행 상황을 추적할 수 있게 한다."}, {"question": "원인-결과 그래프에서 'E(Exclusive)' 제약 조건은?", "options": ["A. 모든 원인이 동시에 참일 수 있다", "B. 연결된 원인들 중 최대 하나만 참이 될 수 있다", "C. 연결된 원인들 중 하나는 반드시 참이어야 한다", "D. 모든 원인이 동시에 거짓이어야 한다"], "answer": "B", "explanation": "원인-결과 그래프에서 E(Exclusive, 상호 배타) 제약은 연결된 원인들 중 최대 하나만 참이 될 수 있고, 동시에 여러 원인이 참이 될 수 없음을 의미한다."}, {"question": "조건 커버리지 100%가 결정 커버리지 100%를 보장하지 못하는 예시로 옳은 것은?", "options": ["A. 단일 조건으로 구성된 결정", "B. 'if (A || B)'에서 A=T, B=F와 A=F, B=T만 테스트한 경우", "C. 'if (A && B)'에서 A=T, B=T만 테스트한 경우", "D. 조건이 없는 단순 구문"], "answer": "B", "explanation": "'if (A || B)'에서 (A=T, B=F): 결정=T, (A=F, B=T): 결정=T인 경우 조건 A, B 모두 참/거짓을 경험했지만 결정 결과가 항상 T여서 결정이 거짓인 경우를 커버하지 못한다."}, {"question": "페어와이즈 테스팅을 수행할 때 사용하는 주요 도구/알고리즘은?", "options": ["A. 결정 테이블", "B. OATS(Orthogonal Array Testing Strategy) 또는 PICT 같은 도구", "C. 상태 전이 다이어그램", "D. 플로우차트"], "answer": "B", "explanation": "페어와이즈 테스팅은 직교 배열(Orthogonal Array)을 이용한 OATS나 Microsoft의 PICT 같은 도구를 활용하여 2-way 커버리지를 달성하는 테스트 케이스를 효율적으로 생성한다."}, {"question": "다음 중 경험 기반 테스트 기법을 사용하는 주요 장점은?", "options": ["A. 코드 커버리지를 정확히 측정할 수 있다", "B. 공식적인 테스트 기법으로는 발견하기 어려운 결함을 발견할 수 있다", "C. 모든 요구사항을 체계적으로 커버한다", "D. 항상 재현 가능한 테스트를 보장한다"], "answer": "B", "explanation": "경험 기반 기법은 테스터의 직관과 경험을 활용하여 공식적인 명세 기반 또는 구조 기반 기법으로는 발견하기 어려운 결함을 발견하는 데 효과적이다."}, {"question": "분류 트리 기법에서 '클래스(Class)'란?", "options": ["A. 객체 지향 프로그래밍의 클래스", "B. 분류(파라미터)의 구체적인 값이나 값의 집합", "C. 테스트 클래스 파일", "D. 결함 분류 범주"], "answer": "B", "explanation": "분류 트리에서 클래스는 특정 분류(파라미터, 측면)가 취할 수 있는 구체적인 값이나 값의 범위를 의미한다. 트리의 리프 노드에 해당한다."}, {"question": "유즈케이스 테스팅에서 테스트 케이스 도출 시 우선 고려해야 할 흐름은?", "options": ["A. 예외 흐름", "B. 대안 흐름", "C. 기본 흐름", "D. 오류 흐름"], "answer": "C", "explanation": "유즈케이스 테스팅에서는 먼저 기본 흐름(행위자가 목표를 성공적으로 달성하는 경로)에 대한 테스트 케이스를 도출하고, 이후 대안 흐름과 예외 흐름을 추가로 다룬다."}, {"question": "구조 기반(화이트박스) 기법이 효과적으로 결함을 발견하는 영역은?", "options": ["A. 요구사항 누락", "B. 사용성 결함", "C. 코드 내 오타, 논리 오류, 미실행 코드", "D. 보안 취약점"], "answer": "C", "explanation": "화이트박스 기법은 코드 내의 논리 오류, 조건 처리 오류, 데드코드(실행되지 않는 코드) 등 코드 레벨의 결함을 발견하는 데 효과적이다."}, {"question": "경계값 분석에서 '중간값(Mid-point value)'의 역할은?", "options": ["A. 반드시 테스트해야 하는 핵심 경계값", "B. 유효 동등 클래스의 대표값으로 활용", "C. 무효 클래스의 대표값으로 활용", "D. 경계값 분석에서 사용되지 않음"], "answer": "B", "explanation": "경계값 분석에서 중간값은 반드시 필요한 경계값은 아니지만, 유효 동등 클래스의 대표값으로 활용하여 동등 분할과 함께 사용할 수 있다."}, {"question": "오류 추정 기법의 공식화된 버전은?", "options": ["A. 동등 분할", "B. 결함 공격(Fault Attack)", "C. 경계값 분석", "D. 결정 테이블"], "answer": "B", "explanation": "결함 공격(Fault Attack)은 오류 추정 기법을 보다 체계적으로 정리한 접근 방식으로, 알려진 결함 유형 목록을 만들어 해당 영역을 집중적으로 테스트한다."}, {"question": "상태 전이 다이어그램에서 '종료 상태(Final State)'의 특징은?", "options": ["A. 반드시 한 개여야 한다", "B. 전이가 나가지 않는 상태로 프로세스 종료를 나타낸다", "C. 다른 상태로 전이하는 상태", "D. 가장 먼저 방문하는 상태"], "answer": "B", "explanation": "종료 상태(Final State)는 시스템이나 프로세스의 종료를 나타내며, 이 상태에서 더 이상 다른 상태로 나가는 전이가 없다. 여러 개가 존재할 수 있다."}, {"question": "결정 테이블에서 '행동(Action)'은 무엇을 의미하는가?", "options": ["A. 조건이 평가되는 방식", "B. 특정 조건 조합이 만족될 때 시스템이 수행해야 하는 동작이나 결과", "C. 테스트 케이스 실행 순서", "D. 오류 메시지"], "answer": "B", "explanation": "결정 테이블에서 행동(Action)은 특정 조건 조합(규칙)이 만족될 때 시스템이 수행해야 하는 동작, 출력, 결과를 의미한다."}, {"question": "다음 중 경계값 분석을 적용하기 적합하지 않은 경우는?", "options": ["A. 입력값이 연속적인 수치 범위를 가지는 경우", "B. 명확한 순서가 있는 범주형 데이터의 경우", "C. 이산적인 범주 값(예: 색상 목록)을 가지는 경우", "D. 날짜 범위를 입력받는 경우"], "answer": "C", "explanation": "경계값 분석은 순서가 있고 연속적인 또는 이산적 범위를 가지는 입력에 적합하다. 순서가 없는 이산적 범주형 값(예: 색상 목록)에는 적용하기 어렵다."}, {"question": "화이트박스 테스트에서 기본 경로 테스팅(Basis Path Testing)의 목적은?", "options": ["A. 모든 가능한 경로를 테스트", "B. 독립적인 선형 경로 집합(기본 경로 집합)을 모두 실행하여 결정 커버리지 달성", "C. 오직 최단 경로만 테스트", "D. 루프가 있는 경로만 테스트"], "answer": "B", "explanation": "기본 경로 테스팅(McCabe)은 제어 흐름 그래프의 순환 복잡도(Cyclomatic Complexity)를 기반으로 독립적인 선형 기본 경로 집합을 식별하여 모두 실행함으로써 결정 커버리지를 보장한다."}, {"question": "동등 분할 기법 적용 시 '약한 동등 분할(Weak Equivalence Partitioning)'은?", "options": ["A. 각 동등 클래스에서 하나의 대표값을 선택하여 테스트", "B. 모든 동등 클래스의 조합을 테스트", "C. 경계값만을 선택하여 테스트", "D. 무효 클래스를 제외하고 테스트"], "answer": "A", "explanation": "약한 동등 분할은 각 동등 클래스에서 하나의 값만 선택하여 테스트하는 방식으로, 각 입력 변수를 독립적으로 고려한다. 강한 동등 분할은 클래스 간의 모든 조합을 테스트한다."}, {"question": "탐색적 테스팅에서 '테스트 헌장(Test Charter)'에 포함되어야 할 내용은?", "options": ["A. 세부적인 테스트 절차", "B. 테스트할 영역, 테스트 방법, 발견해야 할 정보 등 세션 목표", "C. 자동화 스크립트 코드", "D. 버그 리포트 양식"], "answer": "B", "explanation": "탐색적 테스팅의 테스트 헌장은 탐색할 영역, 사용할 테스트 접근법, 발견해야 할 정보나 문제 유형 등 세션의 목표와 방향을 기술한다."}, {"question": "결정 커버리지(Decision Coverage)를 달성하면 어떤 커버리지가 보장되는가?", "options": ["A. MC/DC", "B. 경로 커버리지", "C. 구문 커버리지", "D. 조건 커버리지"], "answer": "C", "explanation": "결정 커버리지(분기 커버리지) 100% 달성은 구문 커버리지 100%를 보장한다. 결정 커버리지가 구문 커버리지보다 더 강한 기준이기 때문이다."}, {"question": "원인-결과 그래프 기법에서 '불가능한 조합(Impossible Combination)'을 처리하는 방법은?", "options": ["A. 테스트 케이스에 포함시킨다", "B. 제약 조건으로 표현하여 해당 조합을 제거한다", "C. 별도로 테스트한다", "D. 항상 실패로 처리한다"], "answer": "B", "explanation": "원인-결과 그래프에서 실제로 불가능한 입력 조합(예: 상호 배타적 원인)은 제약 조건(E, I, O, R)으로 표현하여 결정 테이블에서 해당 규칙을 제거한다."}, {"question": "상태 전이 테스팅에서 스위치 커버리지(Switch Coverage) N이 높아질수록?", "options": ["A. 테스트 케이스 수가 줄어든다", "B. 더 긴 전이 시퀀스를 테스트하여 커버리지가 높아진다", "C. 상태 수가 줄어든다", "D. 실행 시간이 줄어든다"], "answer": "B", "explanation": "N-스위치 커버리지에서 N이 클수록 더 긴 전이 시퀀스(N+1개의 전이로 구성된 경로)를 테스트하여 커버리지가 높아진다. 그러나 테스트 케이스 수도 크게 증가한다."}, {"question": "다음 중 정적 테스트 기법과 동적 테스트 기법을 올바르게 구분한 것은?", "options": ["A. 정적: 코드를 실행하여 테스트 / 동적: 코드를 실행하지 않고 테스트", "B. 정적: 코드를 실행하지 않고 검토 / 동적: 소프트웨어를 실행하여 테스트", "C. 정적: 블랙박스 기법 / 동적: 화이트박스 기법", "D. 정적: 단위 테스트 / 동적: 시스템 테스트"], "answer": "B", "explanation": "정적 테스트는 소프트웨어를 실행하지 않고 리뷰, 인스펙션, 정적 분석 등으로 검토하는 기법이고, 동적 테스트는 소프트웨어를 실제로 실행하여 동작을 검증하는 기법이다."}, {"question": "경계값 분석에서 내부 경계(In-point)와 외부 경계(Out-point)의 개념으로 옳은 것은?", "options": ["A. 내부 경계: 유효 범위 안의 경계값 / 외부 경계: 유효 범위 바깥의 바로 다음 값", "B. 내부 경계: 최솟값 / 외부 경계: 최댓값", "C. 내부 경계: 중간값 / 외부 경계: 경계값", "D. 두 개념은 동일하다"], "answer": "A", "explanation": "내부 경계(In-point, on-point)는 유효 범위 안에 있는 경계값이고, 외부 경계(Out-point, off-point)는 유효 범위 바깥에 있는 가장 가까운 값을 의미한다."}, {"question": "분류 트리 기법에서 테스트 케이스는 어떻게 도출되는가?", "options": ["A. 각 분류의 클래스 하나씩을 조합하여 도출", "B. 분류 트리의 루트 노드에서 파생", "C. 오직 경계값만 선택하여 도출", "D. 코드 커버리지 기준으로 도출"], "answer": "A", "explanation": "분류 트리 기법에서는 여러 분류(파라미터)의 리프 노드(클래스)를 조합하여 테스트 케이스를 도출한다. 각 분류에서 하나의 클래스를 선택하여 조합을 구성한다."}, {"question": "상태 전이 다이어그램 기반 테스트에서 '완전한 라운드트립(Complete Round Trip)' 테스트는?", "options": ["A. 한 번의 전이만 테스트", "B. 시작 상태에서 출발하여 같은 상태로 돌아오는 경로를 테스트", "C. 모든 무효 전이를 테스트", "D. 전이 없이 상태만 테스트"], "answer": "B", "explanation": "완전한 라운드트립 테스트는 시작 상태에서 출발하여 일련의 전이를 거쳐 다시 시작 상태로 돌아오는 사이클 경로를 테스트하는 것이다."}, {"question": "동등 분할에서 '강한 동등 분할(Strong Equivalence Partitioning)'은?", "options": ["A. 각 클래스에서 하나의 값만 선택", "B. 여러 입력 변수의 동등 클래스를 조합하여 테스트", "C. 무효 클래스만 집중 테스트", "D. 경계값만 선택"], "answer": "B", "explanation": "강한 동등 분할은 여러 입력 변수 각각의 동등 클래스를 모두 조합(카테시안 곱)하여 테스트 케이스를 만드는 방식으로, 변수 간 조합도 고려한다."}, {"question": "결정 테이블을 축약(Collapse)하는 조건은?", "options": ["A. 동일한 행동을 가진 두 규칙이 하나의 조건에서만 다를 때", "B. 모든 조건이 동일할 때", "C. 행동이 모두 다를 때", "D. 조건의 수가 짝수일 때"], "answer": "A", "explanation": "결정 테이블 축약은 동일한 행동을 가진 두 규칙이 정확히 하나의 조건에서만 참/거짓이 다를 때, 그 조건을 '무관(Don't Care)'으로 표시하여 두 규칙을 하나로 합칠 수 있다."}, {"question": "오류 추정 기법에서 일반적으로 오류가 많이 발생하는 영역을 추정할 때 고려하는 요소는?", "options": ["A. 코드 라인 수", "B. 과거 경험, 알려진 결함 유형, 복잡한 로직, 자주 변경되는 영역", "C. 테스트 도구의 종류", "D. 개발 언어의 종류"], "answer": "B", "explanation": "오류 추정 기법은 테스터의 과거 경험, 알려진 결함 유형, 복잡도가 높은 로직, 과거에 결함이 많았던 모듈, 자주 변경되는 코드 등을 고려하여 오류 발생 가능성이 높은 영역을 추정한다."}, {"question": "블랙박스 테스트 기법들을 조합하여 사용하는 이유는?", "options": ["A. 각 기법이 동일한 결함을 다른 방식으로 발견하기 때문", "B. 각 기법이 서로 다른 측면의 결함을 발견하는 데 효과적이기 때문", "C. 표준에서 의무화하기 때문", "D. 하나의 기법만으로는 테스트 케이스가 너무 많아지기 때문"], "answer": "B", "explanation": "동등 분할, 경계값 분석, 결정 테이블, 상태 전이 등 각 블랙박스 기법은 서로 다른 측면의 결함을 효과적으로 발견한다. 조합 사용으로 더 넓은 결함 유형을 커버할 수 있다."}, {"question": "순환 복잡도(Cyclomatic Complexity)가 10인 경우 기본 경로의 수는?", "options": ["A. 5개", "B. 10개", "C. 20개", "D. 100개"], "answer": "B", "explanation": "순환 복잡도(Cyclomatic Complexity)는 제어 흐름 그래프의 독립적인 선형 경로의 수를 나타낸다. 순환 복잡도가 10이면 독립적인 기본 경로도 10개이다."}, {"question": "경계값 분석과 동등 분할을 함께 사용할 때의 장점은?", "options": ["A. 테스트 케이스 수가 무조건 줄어든다", "B. 클래스 내부와 경계 모두를 체계적으로 테스트하여 결함 발견 가능성이 높아진다", "C. 화이트박스 기법 없이도 코드 커버리지를 달성할 수 있다", "D. 모든 요구사항을 자동으로 커버한다"], "answer": "B", "explanation": "두 기법을 함께 사용하면 클래스 내부의 대표값(동등 분할)과 클래스 경계의 값(경계값 분석)을 모두 테스트하여 다양한 유형의 결함을 발견할 수 있다."}, {"question": "탐색적 테스팅의 단점으로 옳은 것은?", "options": ["A. 코드 커버리지가 너무 높아진다", "B. 테스트가 재현 가능하지 않을 수 있고 테스터의 역량에 따라 효과가 크게 달라진다", "C. 항상 많은 테스트 도구가 필요하다", "D. 자동화할 수 없다"], "answer": "B", "explanation": "탐색적 테스팅의 주요 단점은 테스트의 재현 가능성이 낮고 (무엇을 어떻게 테스트했는지 추적이 어려움), 테스터의 경험과 역량에 크게 의존한다는 것이다."}, {"question": "다음 중 블랙박스 테스트와 화이트박스 테스트 모두에서 활용 가능한 것은?", "options": ["A. 구문 커버리지", "B. 경계값 분석", "C. 테스트 케이스의 조합 기준(결합 커버리지)", "D. 결정 커버리지"], "answer": "C", "explanation": "테스트 케이스의 조합 기준은 블랙박스와 화이트박스 모두에서 활용될 수 있다. 구문/결정 커버리지는 화이트박스 전용, 경계값 분석은 블랙박스 전용이다."}, {"question": "결정 테이블에서 가능한 최대 규칙 수를 줄이기 위한 방법은?", "options": ["A. 조건의 수를 늘린다", "B. 무관 조건(Don't Care)을 활용하여 규칙을 합친다", "C. 행동의 종류를 줄인다", "D. 결정 테이블을 여러 개로 나눈다"], "answer": "B", "explanation": "무관 조건(Don't Care, -)을 활용하면 동일한 행동을 가진 여러 규칙을 하나로 합칠 수 있어 결정 테이블의 규칙 수를 줄이고 관리를 단순화할 수 있다."}, {"question": "소프트웨어 테스트 기법 선택 시 고려해야 할 요소로 가장 적절한 것은?", "options": ["A. 개발자의 선호도", "B. 테스트 수준, 소프트웨어 유형, 위험, 요구사항의 명확성, 시간 및 예산", "C. 테스트 도구의 종류", "D. 개발 언어"], "answer": "B", "explanation": "테스트 기법 선택 시에는 테스트 수준(단위/통합/시스템), 소프트웨어 유형, 식별된 위험, 명세의 명확성, 가용 시간 및 예산, 테스터의 경험 등 다양한 요소를 종합적으로 고려해야 한다."}],unit3:[{"question": "동등 분할(Equivalence Partitioning) 기법에 대한 설명으로 옳은 것은?", "options": ["A. 입력값의 경계에 위치한 값을 선택하여 테스트하는 기법이다", "B. 입력 데이터를 유사한 특성을 가진 그룹으로 나누고 각 그룹에서 대표값을 선택하는 기법이다", "C. 모든 가능한 입력값의 조합을 테스트하는 기법이다", "D. 소프트웨어의 내부 구조를 기반으로 테스트 케이스를 설계하는 기법이다"], "answer": "B", "explanation": "동등 분할은 입력 데이터를 동등한 특성을 가진 클래스(파티션)로 나누고, 각 파티션에서 하나의 대표값을 선택하여 테스트 케이스를 설계하는 블랙박스 테스트 기법이다."}, {"question": "동등 분할 기법에서 유효 동등 클래스(Valid Equivalence Class)란?", "options": ["A. 시스템이 오류를 발생시키는 입력값의 집합", "B. 테스트를 통과할 것으로 예상되는 입력값의 집합", "C. 시스템이 정상적으로 처리해야 하는 유효한 입력값의 집합", "D. 경계값에 위치한 입력값의 집합"], "answer": "C", "explanation": "유효 동등 클래스는 시스템이 정상적으로 수용하고 처리할 것으로 예상되는 유효한 입력값들의 집합이다."}, {"question": "나이 입력 필드에 1~120 사이의 값을 입력받는 시스템이 있다. 동등 분할 기법을 적용할 때 무효 동등 클래스에 해당하는 것은?", "options": ["A. 50", "B. 1", "C. 120", "D. 0"], "answer": "D", "explanation": "0은 유효 범위(1~120) 밖에 있으므로 무효 동등 클래스에 해당한다. 유효 동등 클래스는 1~120 범위 내의 값이며, 무효 동등 클래스는 0 이하와 121 이상의 값이다."}, {"question": "경계값 분석(Boundary Value Analysis) 기법에 대한 설명으로 옳은 것은?", "options": ["A. 동등 분할 기법과 완전히 독립적으로 사용되는 기법이다", "B. 동등 클래스의 경계에 있는 값을 중심으로 테스트 케이스를 설계하는 기법이다", "C. 소프트웨어 내부 코드의 분기점을 분석하여 테스트 케이스를 설계하는 기법이다", "D. 사용자의 경험을 바탕으로 테스트 케이스를 설계하는 기법이다"], "answer": "B", "explanation": "경계값 분석은 동등 분할의 보완적 기법으로, 동등 클래스 경계에 위치한 값(경계값, 경계값-1, 경계값+1)을 테스트 케이스로 선택한다. 오류가 경계값 근처에서 많이 발생하는 경험적 사실에 기반한다."}, {"question": "입력값의 범위가 1 이상 100 이하인 경우, 2-값 경계값 분석(2-value BVA)에서 선택할 테스트 케이스가 아닌 것은?", "options": ["A. 1", "B. 50", "C. 100", "D. 0"], "answer": "B", "explanation": "2-값 경계값 분석에서는 각 경계의 양쪽 값을 선택한다. 범위가 1~100일 때 선택값은 0, 1, 100, 101이다. 50은 중간값으로 2-값 BVA에서는 포함되지 않는다."}, {"question": "3-값 경계값 분석(3-value BVA)에서 범위가 10 이상 20 이하인 경우 선택해야 할 경계값의 개수는?", "options": ["A. 2개", "B. 4개", "C. 6개", "D. 8개"], "answer": "C", "explanation": "3-값 BVA에서는 각 경계에서 경계값-1, 경계값, 경계값+1을 선택한다. 하한 경계: 9, 10, 11 / 상한 경계: 19, 20, 21로 총 6개가 선택된다."}, {"question": "결정 테이블(Decision Table) 기법에 대한 설명으로 옳지 않은 것은?", "options": ["A. 복잡한 비즈니스 규칙이나 논리적 조건을 테스트하는 데 유용하다", "B. 조건과 행동의 조합을 체계적으로 표현할 수 있다", "C. N개의 조건이 있을 때 최대 2^N개의 규칙을 가질 수 있다", "D. 소스코드의 내부 구조를 분석하여 테스트 케이스를 도출한다"], "answer": "D", "explanation": "결정 테이블 기법은 블랙박스 테스트 기법으로, 소스코드 내부 구조 분석이 아닌 입력 조건과 그에 따른 행동(출력)의 조합을 분석하여 테스트 케이스를 도출한다."}, {"question": "결정 테이블에서 조건이 3개일 때, 가능한 최대 규칙(Rule)의 수는?", "options": ["A. 3", "B. 6", "C. 8", "D. 9"], "answer": "C", "explanation": "각 조건이 True/False 두 가지 값을 가질 때, N개의 조건에서 최대 2^N개의 규칙이 가능하다. 조건이 3개이면 2^3 = 8개의 규칙이 가능하다."}, {"question": "결정 테이블에서 '무관(Don't Care)' 표시(-)의 의미는?", "options": ["A. 해당 조건이 항상 True임을 나타낸다", "B. 해당 조건이 항상 False임을 나타낸다", "C. 해당 조건의 값이 결과에 영향을 미치지 않음을 나타낸다", "D. 해당 조건을 테스트할 필요가 없음을 나타낸다"], "answer": "C", "explanation": "결정 테이블에서 '-'(무관)은 해당 조건의 값(True/False)에 상관없이 동일한 행동이 수행됨을 의미한다. 즉, 해당 조건이 결과에 영향을 미치지 않는 경우에 사용한다."}, {"question": "상태 전이 테스트(State Transition Testing)에 대한 설명으로 옳은 것은?", "options": ["A. 프로그램의 모든 분기를 테스트하는 기법이다", "B. 시스템이 이벤트에 따라 상태 간에 전이하는 것을 테스트하는 기법이다", "C. 입력값의 경계를 테스트하는 기법이다", "D. 두 개 이상의 변수 조합을 테스트하는 기법이다"], "answer": "B", "explanation": "상태 전이 테스트는 시스템이 특정 이벤트(조건)에 의해 한 상태에서 다른 상태로 전이되는 동작을 테스트하는 기법이다. ATM, 트래픽 신호, 자판기 등 상태 기반 시스템에 적합하다."}, {"question": "상태 전이 다이어그램의 구성 요소가 아닌 것은?", "options": ["A. 상태(State)", "B. 이벤트(Event)", "C. 전이(Transition)", "D. 루프(Loop)"], "answer": "D", "explanation": "상태 전이 다이어그램의 주요 구성 요소는 상태(State), 이벤트(Event/조건), 전이(Transition), 행동(Action/출력)이다. 루프는 상태 전이 다이어그램의 공식 구성 요소가 아니다."}, {"question": "상태 전이 테스트에서 0-스위치 커버리지(0-switch coverage)란?", "options": ["A. 모든 상태를 최소 1회 방문하는 것", "B. 모든 전이를 최소 1회 수행하는 것", "C. 모든 유효하지 않은 전이를 테스트하는 것", "D. 2개의 연속된 전이를 모두 테스트하는 것"], "answer": "B", "explanation": "0-스위치 커버리지는 모든 단일 전이(single transition)를 최소 1회 실행하는 것을 목표로 한다. 이는 가장 기본적인 수준의 상태 전이 커버리지이다."}, {"question": "유스케이스 테스트(Use Case Testing)의 주요 목적은?", "options": ["A. 소스코드의 오류를 발견하는 것", "B. 사용자의 관점에서 시스템 동작 시나리오를 검증하는 것", "C. 데이터베이스 쿼리를 최적화하는 것", "D. 네트워크 성능을 측정하는 것"], "answer": "B", "explanation": "유스케이스 테스트는 사용자와 시스템 간의 상호작용 시나리오(유스케이스)를 기반으로 테스트 케이스를 설계하여, 사용자 관점에서 시스템의 기능을 검증하는 기법이다."}, {"question": "페어와이즈 테스트(Pairwise Testing)의 핵심 개념은?", "options": ["A. 모든 가능한 입력 조합을 테스트한다", "B. 모든 두 파라미터의 조합을 최소 한 번 테스트한다", "C. 두 명의 테스터가 동시에 테스트를 수행한다", "D. 두 개의 시스템을 동시에 비교하며 테스트한다"], "answer": "B", "explanation": "페어와이즈(All-pairs) 테스트는 모든 파라미터의 전체 조합 대신, 임의의 두 파라미터(파라미터 쌍)의 모든 조합을 최소 한 번씩 커버하도록 테스트 케이스를 설계하는 기법이다."}, {"question": "페어와이즈 테스트가 가장 유용한 상황은?", "options": ["A. 입력 파라미터가 1~2개인 경우", "B. 입력 파라미터가 많고 전체 조합 테스트가 비현실적인 경우", "C. 소스코드의 분기를 테스트해야 하는 경우", "D. 경계값 테스트가 필요한 경우"], "answer": "B", "explanation": "파라미터 수가 많아질수록 전체 조합(N-way)의 수는 기하급수적으로 증가한다. 페어와이즈는 테스트 케이스 수를 크게 줄이면서도 결함 검출 효율을 유지할 수 있어, 파라미터가 많은 경우에 유용하다."}, {"question": "구문 커버리지(Statement Coverage)에 대한 설명으로 옳은 것은?", "options": ["A. 모든 조건의 True/False 조합을 테스트한다", "B. 모든 실행 가능한 구문이 최소 1회 실행되도록 테스트 케이스를 설계한다", "C. 모든 가능한 경로를 테스트한다", "D. 모든 분기점에서 True와 False 경로를 모두 테스트한다"], "answer": "B", "explanation": "구문 커버리지(라인 커버리지라고도 함)는 소스코드의 모든 실행 가능한 구문(statement)이 최소 한 번 실행되도록 테스트 케이스를 설계하는 화이트박스 테스트 기법이다."}, {"question": "구문 커버리지 100%를 달성했을 때 보장되는 것은?", "options": ["A. 모든 결함이 발견된다", "B. 모든 구문이 최소 1회 실행된다", "C. 모든 분기 경로가 테스트된다", "D. 모든 조건이 True와 False로 평가된다"], "answer": "B", "explanation": "구문 커버리지 100%는 모든 실행 가능한 구문이 최소 한 번 실행됨을 보장한다. 하지만 분기의 False 경로나 조건 조합을 보장하지 않으므로 모든 결함을 발견할 수는 없다."}, {"question": "결정 커버리지(Decision Coverage, Branch Coverage)에 대한 설명으로 옳은 것은?", "options": ["A. 모든 개별 조건이 True와 False로 평가되도록 한다", "B. 모든 결정 포인트에서 True와 False 결과가 모두 테스트되도록 한다", "C. 모든 가능한 경로를 테스트한다", "D. 조건들의 모든 조합을 테스트한다"], "answer": "B", "explanation": "결정 커버리지(분기 커버리지)는 if문, while문 등 각 결정 포인트(decision point)에서 결과가 True와 False 두 방향으로 모두 평가되도록 테스트 케이스를 설계하는 기법이다."}, {"question": "조건 커버리지(Condition Coverage)에 대한 설명으로 옳은 것은?", "options": ["A. 복합 조건의 전체 결과가 True/False가 되도록 테스트한다", "B. 복합 조건을 구성하는 각 개별 조건이 True와 False로 평가되도록 테스트한다", "C. 모든 경로를 테스트한다", "D. 조건의 경계값을 테스트한다"], "answer": "B", "explanation": "조건 커버리지는 복합 조건(예: A AND B)을 구성하는 각 개별 조건(A, B)이 독립적으로 True와 False로 평가되는 경우를 모두 커버하도록 테스트 케이스를 설계한다."}, {"question": "조건 커버리지와 결정 커버리지의 관계로 옳은 것은?", "options": ["A. 조건 커버리지를 달성하면 항상 결정 커버리지도 달성된다", "B. 결정 커버리지를 달성하면 항상 조건 커버리지도 달성된다", "C. 조건 커버리지를 달성해도 결정 커버리지를 달성하지 못할 수 있다", "D. 두 커버리지는 항상 동일한 결과를 보장한다"], "answer": "C", "explanation": "조건 커버리지를 달성해도 결정 커버리지를 달성하지 못할 수 있다. 예를 들어 'A AND B'에서 A=T/B=F, A=F/B=T 조합은 조건 커버리지를 달성하지만, 전체 결정의 결과가 모두 False이므로 결정 커버리지를 달성하지 못한다."}, {"question": "조건/결정 커버리지(Condition/Decision Coverage)에 대한 설명으로 옳은 것은?", "options": ["A. 조건 커버리지와 결정 커버리지 중 하나만 달성하면 된다", "B. 조건 커버리지와 결정 커버리지를 모두 동시에 달성해야 한다", "C. 모든 경로를 테스트해야 한다", "D. 모든 조건 조합을 테스트해야 한다"], "answer": "B", "explanation": "조건/결정 커버리지(C/DC)는 각 개별 조건이 True/False로 모두 평가되고(조건 커버리지), 동시에 각 결정 포인트의 결과도 True/False가 모두 나오도록(결정 커버리지) 테스트 케이스를 설계하는 기법이다."}, {"question": "수정 조건/결정 커버리지(MC/DC)의 핵심 요건은?", "options": ["A. 각 조건이 다른 조건과 독립적으로 결정 결과에 영향을 미침을 보여야 한다", "B. 모든 경로를 테스트해야 한다", "C. 모든 조건 조합을 테스트해야 한다", "D. 경계값을 모두 테스트해야 한다"], "answer": "A", "explanation": "MC/DC(Modified Condition/Decision Coverage)는 각 개별 조건이 다른 조건과 무관하게 독립적으로 전체 결정 결과에 영향을 미침을 보여야 한다. 항공 소프트웨어(DO-178C) 등 안전 중요 시스템에서 요구된다."}, {"question": "다중 조건 커버리지(Multiple Condition Coverage)에 대한 설명으로 옳은 것은?", "options": ["A. 각 조건이 True와 False로 한 번씩 평가되면 달성된다", "B. 각 결정 포인트의 모든 조건 조합을 테스트한다", "C. 모든 경로를 테스트한다", "D. 결정 포인트에서 True 또는 False 중 하나만 테스트한다"], "answer": "B", "explanation": "다중 조건 커버리지는 각 결정 포인트에서 모든 가능한 조건의 True/False 조합을 테스트한다. N개의 조건이 있을 때 2^N개의 조합이 필요하므로 비용이 가장 많이 드는 커버리지 기준이다."}, {"question": "경로 커버리지(Path Coverage)에 대한 설명으로 옳은 것은?", "options": ["A. 프로그램의 모든 가능한 실행 경로를 테스트한다", "B. 모든 분기를 테스트한다", "C. 모든 구문을 테스트한다", "D. 모든 조건을 테스트한다"], "answer": "A", "explanation": "경로 커버리지는 프로그램의 모든 가능한 실행 경로(입력부터 출력까지의 모든 경로)를 테스트하는 가장 강력하지만, 루프가 있으면 무한히 많은 경로가 생겨 실제로 완전 달성이 어렵다."}, {"question": "다음 중 커버리지 강도가 가장 강한 것부터 순서대로 나열한 것은?", "options": ["A. 구문 > 결정 > 조건 > MC/DC > 다중조건", "B. 다중조건 > MC/DC > 조건/결정 > 결정 > 구문", "C. 결정 > 구문 > 조건 > MC/DC > 다중조건", "D. MC/DC > 다중조건 > 조건/결정 > 결정 > 구문"], "answer": "B", "explanation": "커버리지 강도(포함 관계)는 다중조건 > MC/DC > 조건/결정(C/DC) > 결정(분기) > 구문 커버리지 순이다. 강도가 강할수록 더 많은 테스트 케이스가 필요하다."}, {"question": "맥케이브의 사이클로매틱 복잡도(Cyclomatic Complexity)에 대한 설명으로 옳은 것은?", "options": ["A. 소프트웨어의 성능을 측정하는 지표이다", "B. 프로그램의 논리적 복잡도를 측정하는 지표로, 독립적인 경로의 수를 나타낸다", "C. 코드의 줄 수를 측정하는 지표이다", "D. 테스트 케이스의 수를 결정하는 절대적인 기준이다"], "answer": "B", "explanation": "사이클로매틱 복잡도(CC)는 프로그램의 논리적 복잡도를 측정하는 지표로, 독립적인 실행 경로의 수를 나타낸다. CC = E - N + 2P (E: 에지 수, N: 노드 수, P: 연결된 구성요소 수) 공식으로 계산한다."}, {"question": "제어 흐름 그래프에서 노드가 6개, 에지가 8개일 때 사이클로매틱 복잡도는?", "options": ["A. 2", "B. 3", "C. 4", "D. 6"], "answer": "B", "explanation": "사이클로매틱 복잡도 = E - N + 2 = 8 - 6 + 2 = 4. 단일 프로그램(P=1)의 경우 CC = E - N + 2이다."}, {"question": "탐색적 테스트(Exploratory Testing)에 대한 설명으로 옳은 것은?", "options": ["A. 사전에 철저하게 테스트 케이스를 작성한 후 실행하는 테스트이다", "B. 테스트 설계와 실행을 동시에 수행하며 학습을 통해 테스트를 개선해 나가는 기법이다", "C. 자동화 도구를 이용하여 수행하는 테스트이다", "D. 정해진 스크립트에 따라 수행하는 테스트이다"], "answer": "B", "explanation": "탐색적 테스트는 테스터가 사전 정의된 스크립트에 의존하지 않고, 시스템을 탐색하면서 동시에 테스트를 설계하고 실행하며, 학습 결과를 테스트에 반영해 나가는 경험 기반 테스트 기법이다."}, {"question": "탐색적 테스트의 세션 기반 테스트 관리(SBTM)에서 '차터(Charter)'란?", "options": ["A. 테스트 결과를 기록하는 문서이다", "B. 테스트 세션의 미션 또는 목표를 정의한 짧은 문서이다", "C. 테스트 케이스의 모음이다", "D. 테스트 환경 설정 문서이다"], "answer": "B", "explanation": "차터(Charter)는 세션 기반 탐색적 테스트에서 테스트 세션의 목표, 탐색 대상, 접근 방법을 간략히 정의한 문서로, 테스터가 테스트 세션에서 무엇을 탐색할지 방향을 제시한다."}, {"question": "오류 추정(Error Guessing) 기법에 대한 설명으로 옳은 것은?", "options": ["A. 수학적 모델을 사용하여 오류 위치를 추정하는 기법이다", "B. 테스터의 경험과 직관을 바탕으로 오류가 발생할 가능성이 있는 부분을 추측하여 테스트하는 기법이다", "C. 자동화 도구로 오류를 탐지하는 기법이다", "D. 테스트 명세서를 분석하여 오류를 발견하는 기법이다"], "answer": "B", "explanation": "오류 추정은 테스터의 경험, 직관, 과거 결함 데이터를 바탕으로 오류가 발생하기 쉬운 부분을 추측하여 테스트 케이스를 설계하고 테스트하는 경험 기반 기법이다."}, {"question": "체크리스트 기반 테스트(Checklist-based Testing)의 특징으로 옳은 것은?", "options": ["A. 매번 새롭게 테스트 케이스를 설계해야 한다", "B. 과거 경험이나 표준을 바탕으로 작성된 체크리스트를 활용하여 테스트한다", "C. 소스코드를 직접 분석하여 테스트한다", "D. 자동화 도구를 반드시 사용해야 한다"], "answer": "B", "explanation": "체크리스트 기반 테스트는 과거 결함 데이터, 테스트 경험, 기술 표준 등을 바탕으로 작성된 체크리스트를 활용하여 테스트를 수행하는 경험 기반 기법이다."}, {"question": "원인-결과 그래프(Cause-Effect Graph) 기법에 대한 설명으로 옳은 것은?", "options": ["A. 소스코드의 제어 흐름을 그래프로 표현한다", "B. 입력 조건(원인)과 출력 결과(결과) 사이의 논리적 관계를 그래프로 표현하여 테스트 케이스를 도출한다", "C. 데이터 흐름을 그래프로 표현하여 테스트한다", "D. 상태 전이를 그래프로 표현하여 테스트한다"], "answer": "B", "explanation": "원인-결과 그래프는 입력 조건(원인)과 출력 조건(결과)을 노드로, 논리적 관계를 에지로 표현한 그래프이다. 이 그래프에서 결정 테이블을 도출하여 테스트 케이스를 설계한다."}, {"question": "블랙박스 테스트와 화이트박스 테스트의 차이점으로 옳은 것은?", "options": ["A. 블랙박스 테스트는 내부 구조를 알고 수행하고, 화이트박스 테스트는 내부 구조를 모르고 수행한다", "B. 블랙박스 테스트는 내부 구조 없이 기능을 기반으로 수행하고, 화이트박스 테스트는 내부 구조를 기반으로 수행한다", "C. 블랙박스 테스트는 단위 테스트에만 사용하고, 화이트박스 테스트는 시스템 테스트에만 사용한다", "D. 블랙박스 테스트는 자동화가 불가능하고, 화이트박스 테스트는 항상 자동화된다"], "answer": "B", "explanation": "블랙박스 테스트는 내부 구조나 코드 없이 입력/출력(기능 명세)만을 기반으로 테스트하고, 화이트박스 테스트는 소스코드, 내부 로직, 구조를 파악하고 수행하는 테스트이다."}, {"question": "좋은 테스트 케이스의 특성으로 옳지 않은 것은?", "options": ["A. 결함을 발견할 가능성이 높아야 한다", "B. 중복된 테스트를 최대한 많이 포함해야 한다", "C. 기대 결과가 명확하게 정의되어야 한다", "D. 재사용 가능해야 한다"], "answer": "B", "explanation": "좋은 테스트 케이스는 결함 발견 확률이 높고, 기대 결과가 명확하며, 중복이 없고, 재사용 가능하며, 추적 가능해야 한다. 중복된 테스트는 오히려 비효율적이다."}, {"question": "점수 입력 필드가 0~100점 사이의 값을 받을 때, 동등 분할로 나눈 파티션의 개수는?", "options": ["A. 1개", "B. 2개", "C. 3개", "D. 4개"], "answer": "C", "explanation": "동등 분할로 나누면: 유효 클래스(0~100), 무효 클래스 1(0 미만), 무효 클래스 2(100 초과)로 총 3개의 파티션이 생성된다."}, {"question": "데이터 흐름 테스트(Data Flow Testing)에서 주로 관심을 갖는 것은?", "options": ["A. 제어 흐름의 모든 경로", "B. 변수의 정의(definition)와 사용(use) 사이의 관계", "C. 모든 분기 조건의 True/False 평가", "D. 코드의 모든 구문 실행"], "answer": "B", "explanation": "데이터 흐름 테스트는 변수가 정의(값이 할당)된 시점부터 사용(값이 참조)되는 시점까지의 경로를 추적하여, 변수의 잘못된 정의나 사용으로 인한 오류를 발견하는 화이트박스 테스트 기법이다."}, {"question": "분류 트리(Classification Tree) 기법에 대한 설명으로 옳은 것은?", "options": ["A. 결정 트리를 이용하여 소스코드를 분석하는 기법이다", "B. 입력 도메인을 계층적으로 분류하여 테스트 케이스를 체계적으로 생성하는 기법이다", "C. 클래스 다이어그램을 분석하여 테스트하는 기법이다", "D. 머신러닝 알고리즘을 테스트에 활용하는 기법이다"], "answer": "B", "explanation": "분류 트리 기법은 입력 도메인을 트리 형태로 계층적으로 분류하고, 각 잎 노드(클래스)에서 대표값을 선택하여 테스트 케이스를 생성하는 체계적인 블랙박스 테스트 기법이다."}, {"question": "루프 테스트(Loop Testing)에서 단순 루프(Simple Loop)에 대해 테스트해야 할 경우가 아닌 것은?", "options": ["A. 루프를 0번 수행", "B. 루프를 1번 수행", "C. 루프를 최대 반복 횟수의 절반 수행", "D. 루프를 무한 반복 수행"], "answer": "D", "explanation": "단순 루프 테스트에서는 0회, 1회, 2회, 최대-1회, 최대 횟수, 최대+1회 등의 케이스를 테스트한다. '무한 반복 수행'은 루프 테스트의 정상적인 테스트 케이스가 아니다."}, {"question": "복잡한 비즈니스 규칙이 있고 여러 조건의 조합에 따라 결과가 달라지는 시스템을 테스트할 때 가장 적합한 기법은?", "options": ["A. 경계값 분석", "B. 결정 테이블 테스트", "C. 구문 커버리지", "D. 경로 커버리지"], "answer": "B", "explanation": "결정 테이블 테스트는 여러 조건의 조합에 따라 결과가 달라지는 복잡한 비즈니스 규칙을 체계적으로 표현하고 테스트하는 데 가장 적합하다."}, {"question": "동등 분할에서 약한 동등 분할(Weak Equivalence Partitioning)과 강한 동등 분할(Strong Equivalence Partitioning)의 차이는?", "options": ["A. 약한 동등 분할은 유효 클래스만 테스트하고, 강한 동등 분할은 무효 클래스도 테스트한다", "B. 약한 동등 분할은 각 파티션에서 하나의 값을 선택하고, 강한 동등 분할은 파티션 조합을 모두 테스트한다", "C. 약한 동등 분할은 경계값을 포함하고, 강한 동등 분할은 경계값을 제외한다", "D. 약한 동등 분할은 화이트박스 기법이고, 강한 동등 분할은 블랙박스 기법이다"], "answer": "B", "explanation": "약한 동등 분할은 각 파티션에서 하나씩의 대표값을 독립적으로 선택하는 것이고, 강한 동등 분할은 여러 입력 변수의 파티션 조합(카르테시안 곱)을 모두 테스트하는 더 철저한 방법이다."}, {"question": "구문 커버리지의 한계점으로 옳은 것은?", "options": ["A. 테스트 케이스 수가 너무 많아 실용적이지 않다", "B. 실행되지 않는 코드(dead code)가 있어도 100% 달성이 불가능하다", "C. If 구문의 False 경로가 테스트되지 않을 수 있다", "D. 모든 입력값을 테스트해야 한다"], "answer": "C", "explanation": "구문 커버리지 100%를 달성해도 if 구문에서 조건이 항상 True인 경우 False 경로는 실행되지 않을 수 있다. 즉, 분기의 일부 경로가 테스트되지 않는 한계가 있다."}, {"question": "경계값 분석에서 '최악 경우 경계값 분석(Worst Case BVA)'의 특징은?", "options": ["A. 각 변수의 최솟값만 테스트한다", "B. 여러 변수가 동시에 경계값을 가지는 조합을 테스트한다", "C. 단일 변수의 경계값만 테스트한다", "D. 무효 클래스의 경계값만 테스트한다"], "answer": "B", "explanation": "최악 경우 경계값 분석은 여러 입력 변수가 동시에 경계값을 가지는 경우를 포함하는 조합을 테스트한다. 일반 경계값 분석보다 테스트 케이스 수가 많지만 더 철저한 테스트가 가능하다."}, {"question": "MC/DC를 달성하기 위해 N개의 조건이 있는 결정에 필요한 최소 테스트 케이스 수는?", "options": ["A. N", "B. N+1", "C. 2N", "D. 2^N"], "answer": "B", "explanation": "MC/DC를 달성하기 위해서는 N개의 조건에 대해 최소 N+1개의 테스트 케이스가 필요하다. 다중 조건 커버리지(2^N개)보다 훨씬 적은 테스트 케이스로 높은 커버리지를 달성할 수 있다."}, {"question": "상태 전이 테스트에서 음수 테스트(Negative Testing)에 해당하는 것은?", "options": ["A. 유효한 이벤트로 올바른 상태 전이를 확인하는 것", "B. 잘못된 상태에서 이벤트가 발생했을 때 시스템이 적절히 처리하는지 확인하는 것", "C. 모든 상태를 방문하는 것", "D. 최단 경로로 테스트하는 것"], "answer": "B", "explanation": "상태 전이 테스트에서 음수 테스트는 유효하지 않은 상태에서 이벤트가 발생하거나, 예상치 못한 전이가 일어났을 때 시스템이 적절히 오류를 처리하는지 확인하는 테스트이다."}, {"question": "사이클로매틱 복잡도가 5인 프로그램의 독립적인 경로는 최소 몇 개가 보장되어야 하는가?", "options": ["A. 4개", "B. 5개", "C. 6개", "D. 10개"], "answer": "B", "explanation": "사이클로매틱 복잡도는 독립적인 경로(기본 경로)의 수와 같다. 복잡도가 5이면 최소 5개의 독립적인 선형 독립 경로가 존재하며, 기본 경로 테스트는 이 5개의 경로를 모두 커버해야 한다."}, {"question": "결정 테이블에서 '제한 항목(Limited Entry)'과 '확장 항목(Extended Entry)'의 차이는?", "options": ["A. 제한 항목은 조건값이 True/False이고, 확장 항목은 다양한 값을 가질 수 있다", "B. 제한 항목은 더 많은 조건을 다룰 수 있고, 확장 항목은 단순한 조건만 다룬다", "C. 제한 항목은 화이트박스 기법이고, 확장 항목은 블랙박스 기법이다", "D. 제한 항목은 결과를 나타내고, 확장 항목은 조건을 나타낸다"], "answer": "A", "explanation": "제한 항목 결정 테이블은 조건이 True/False(Yes/No)만을 가지고, 확장 항목 결정 테이블은 조건이 다양한 값(예: 특정 선택지)을 가질 수 있어 더 복잡한 상황을 표현할 수 있다."}, {"question": "그레이박스 테스트(Gray-box Testing)란?", "options": ["A. 흑백 화면에서만 수행하는 테스트이다", "B. 내부 구조를 일부 알고 수행하는 테스트로, 블랙박스와 화이트박스의 중간 형태이다", "C. 개발자와 테스터가 공동으로 수행하는 테스트이다", "D. 회색 인터페이스를 테스트하는 기법이다"], "answer": "B", "explanation": "그레이박스 테스트는 내부 구조(코드, 알고리즘, 데이터베이스 등)에 대한 일부 지식을 가지고 기능 테스트를 수행하는 기법으로, 블랙박스와 화이트박스 테스트의 중간 형태이다."}, {"question": "경계값 분석에서 경계가 발생하는 경우가 아닌 것은?", "options": ["A. 최솟값과 최댓값", "B. 입력 데이터의 첫 번째와 마지막 요소", "C. 프로그램 실행 시간", "D. 파일의 최소 크기와 최대 크기"], "answer": "C", "explanation": "경계값 분석은 입력 데이터의 범위 경계, 배열의 첫/마지막 요소, 파일 크기 등에 적용된다. 프로그램 실행 시간은 성능 테스트의 영역으로 경계값 분석의 전형적인 대상이 아니다."}, {"question": "결정 커버리지 100%를 달성하면 자동으로 달성되는 커버리지는?", "options": ["A. 조건 커버리지", "B. 구문 커버리지", "C. 다중 조건 커버리지", "D. 경로 커버리지"], "answer": "B", "explanation": "결정 커버리지(분기 커버리지)를 100% 달성하면, 모든 분기(True/False 경로)가 실행되므로 자동으로 모든 구문도 실행된다. 따라서 구문 커버리지도 100% 달성된다."}, {"question": "유스케이스 테스트에서 '대안 흐름(Alternative Flow)' 테스트의 목적은?", "options": ["A. 정상적인 흐름만을 검증한다", "B. 기본 흐름이 방해될 때 시스템이 제공하는 대안적인 경로를 검증한다", "C. 보안 취약점을 발견한다", "D. 성능을 측정한다"], "answer": "B", "explanation": "유스케이스의 대안 흐름은 기본 흐름이 특정 조건에 의해 방해될 때(예: 로그인 실패, 결제 오류 등) 시스템이 처리하는 대안적인 경로를 검증한다."}, {"question": "데이터 흐름 테스트에서 'du-경로(du-path)'란?", "options": ["A. 변수가 두 번 사용(use)되는 경로", "B. 변수가 정의(definition)된 노드에서 사용(use)되는 노드까지의 결함 없는 경로", "C. 데이터가 입력되는 경로", "D. 데이터베이스와 연결되는 경로"], "answer": "B", "explanation": "du-경로(definition-use path)는 변수가 정의된 노드(d)에서 사용되는 노드(u)까지, 중간에 그 변수의 재정의 없이 이어지는 경로를 말한다."}, {"question": "3개의 파라미터가 각각 3개의 값을 가질 때, 전체 조합 수와 페어와이즈 최소 조합 수의 차이는?", "options": ["A. 전체: 9개, 페어와이즈: 3개", "B. 전체: 27개, 페어와이즈: 9개 이하", "C. 전체: 27개, 페어와이즈: 27개", "D. 전체: 9개, 페어와이즈: 9개"], "answer": "B", "explanation": "3개 파라미터, 각 3개 값이면 전체 조합은 3×3×3=27개이다. 페어와이즈는 임의의 두 파라미터 조합(3×3=9개 쌍)을 커버하면 되므로 최소 9개 이하의 테스트 케이스로 가능하다."}, {"question": "탐색적 테스트가 특히 유용한 상황은?", "options": ["A. 요구사항이 완벽하게 문서화된 경우", "B. 테스트 시간이 충분하고 회귀 테스트가 필요한 경우", "C. 명세가 불완전하거나 테스트 시간이 제한된 경우", "D. 대규모 자동화 테스트가 필요한 경우"], "answer": "C", "explanation": "탐색적 테스트는 요구사항이나 명세가 불완전하거나, 시간이 제한되어 체계적인 테스트 케이스 작성이 어려운 경우, 또는 빠르게 결함을 발견해야 하는 경우에 특히 유용하다."}, {"question": "다음 코드에서 구문 커버리지 100%를 달성하는 데 필요한 최소 테스트 케이스 수는?\n\nif (a > 0) {\n  x = 1;  // Statement 1\n}\ny = 2;  // Statement 2", "options": ["A. 1개", "B. 2개", "C. 3개", "D. 4개"], "answer": "A", "explanation": "구문 커버리지 100%를 위해서는 Statement 1과 Statement 2가 모두 실행되어야 한다. a > 0인 경우(예: a=1) 하나의 테스트 케이스로 두 구문을 모두 실행할 수 있다. 단, False 경로는 테스트되지 않는다."}, {"question": "1-스위치 커버리지(1-switch coverage)란?", "options": ["A. 모든 단일 상태를 방문하는 것", "B. 모든 2개 연속 전이 시퀀스를 테스트하는 것", "C. 모든 3개 연속 전이 시퀀스를 테스트하는 것", "D. 유효하지 않은 전이를 테스트하는 것"], "answer": "B", "explanation": "1-스위치 커버리지는 모든 2개의 연속된 전이(두 번의 전이) 시퀀스를 최소 1회 테스트하는 것이다. n-스위치 커버리지는 모든 n+1개의 연속된 전이를 테스트하는 것이다."}, {"question": "명세 기반 테스트(Specification-based Testing)의 또 다른 명칭은?", "options": ["A. 화이트박스 테스트", "B. 구조 기반 테스트", "C. 블랙박스 테스트", "D. 경험 기반 테스트"], "answer": "C", "explanation": "명세 기반 테스트는 요구사항 명세나 기능 명세를 바탕으로 테스트 케이스를 설계하는 기법으로, 내부 구조를 보지 않는다는 의미에서 블랙박스 테스트라고도 한다."}, {"question": "구조 기반 테스트(Structure-based Testing)의 또 다른 명칭은?", "options": ["A. 블랙박스 테스트", "B. 화이트박스 테스트", "C. 경험 기반 테스트", "D. 탐색적 테스트"], "answer": "B", "explanation": "구조 기반 테스트는 소스코드, 설계 구조, 아키텍처 등 내부 구조를 분석하여 테스트하는 기법으로 화이트박스 테스트라고도 한다."}, {"question": "결정 테이블에서 '행동(Action)' 행의 의미는?", "options": ["A. 테스트 조건을 정의하는 행", "B. 조건의 조합에 따른 시스템의 동작(결과)을 나타내는 행", "C. 테스트 환경 설정을 나타내는 행", "D. 테스터의 작업을 나타내는 행"], "answer": "B", "explanation": "결정 테이블에서 행동(Action) 행은 각 규칙(조건 조합)에 대응하여 시스템이 수행해야 하는 동작 또는 출력 결과를 나타낸다."}, {"question": "오류 추정 기법에서 일반적으로 오류가 많이 발생하는 부분이 아닌 것은?", "options": ["A. 0 값이나 Null 값 처리", "B. 경계값 처리", "C. 잘 테스트된 핵심 알고리즘", "D. 복잡한 계산 로직"], "answer": "C", "explanation": "오류 추정에서 오류가 많이 발생하는 곳은 0/Null 처리, 경계값, 복잡한 로직, 최근 변경된 코드, 오류 처리 루틴 등이다. 잘 테스트된 핵심 알고리즘은 상대적으로 오류가 적다."}, {"question": "MC/DC가 특히 중요하게 사용되는 분야는?", "options": ["A. 웹 게임 개발", "B. 항공 소프트웨어 및 안전 중요 시스템", "C. 소셜 미디어 애플리케이션", "D. 전자상거래 플랫폼"], "answer": "B", "explanation": "MC/DC는 DO-178C(항공 소프트웨어 표준), IEC 61508(기능 안전), ISO 26262(자동차 기능 안전) 등 안전 중요 시스템에서 의무적으로 요구되는 커버리지 기준이다."}, {"question": "약한 일반 동등 분할(Weak General Equivalence Partitioning)에서 2개의 변수(각각 3개 파티션)가 있을 때 최소 테스트 케이스 수는?", "options": ["A. 2개", "B. 3개", "C. 6개", "D. 9개"], "answer": "B", "explanation": "약한 일반 동등 분할에서는 각 파티션당 하나의 대표값을 선택하되, 파티션 조합은 고려하지 않는다. 변수가 2개이고 각각 3개의 파티션이 있으면, 가장 많은 파티션 수 = 3개의 테스트 케이스가 필요하다."}, {"question": "내부 경계값(internal boundary)이 발생하는 예시는?", "options": ["A. 입력 범위의 최솟값", "B. 입력 범위의 최댓값", "C. 조건문 내에서 특정 임계값(예: if x > 100)에 의한 경계", "D. 배열의 첫 번째 인덱스"], "answer": "C", "explanation": "내부 경계값은 명세에 명시적으로 나타나지 않지만 코드 내의 조건문(예: if x > 100)에 의해 발생하는 경계이다. 화이트박스 관점에서 발견될 수 있으며, 100, 101 등의 값이 경계값이 된다."}, {"question": "코드 커버리지 측정 도구가 주로 사용되는 목적은?", "options": ["A. 소프트웨어의 성능을 측정하기 위해", "B. 테스트가 소스코드의 얼마나 많은 부분을 실행했는지 측정하기 위해", "C. 보안 취약점을 자동으로 발견하기 위해", "D. 요구사항의 완성도를 측정하기 위해"], "answer": "B", "explanation": "코드 커버리지 측정 도구는 테스트 실행 중 소스코드의 어느 부분이 실행되었는지 추적하여 커버리지 비율을 측정하고, 아직 테스트되지 않은 부분을 시각화하는 데 사용된다."}, {"question": "유스케이스 테스트에서 '예외 흐름(Exception Flow)' 테스트의 목적은?", "options": ["A. 정상적인 사용자 시나리오를 검증한다", "B. 시스템 오류나 예외 상황에서의 시스템 동작을 검증한다", "C. 성능을 측정한다", "D. 보안을 검증한다"], "answer": "B", "explanation": "예외 흐름 테스트는 시스템 오류, 네트워크 장애, 유효하지 않은 입력 등 예외적인 상황에서 시스템이 어떻게 처리하는지 검증한다."}, {"question": "테스트 케이스의 필수 구성 요소가 아닌 것은?", "options": ["A. 테스트 케이스 식별자", "B. 사전 조건", "C. 테스터의 이름", "D. 기대 결과"], "answer": "C", "explanation": "테스트 케이스의 필수 구성 요소에는 식별자, 목적, 사전조건, 입력 데이터, 실행 절차, 기대 결과, 사후조건 등이 포함된다. 테스터의 이름은 테스트 케이스의 필수 구성 요소가 아니다."}, {"question": "동등 분할 적용 시 고려해야 할 입력 유형이 아닌 것은?", "options": ["A. 외부 조건에 의해 처리되는 입력값의 범위", "B. 입력값의 개수", "C. 특정 유형에 속하는 값들의 집합", "D. 소스코드의 라인 수"], "answer": "D", "explanation": "동등 분할에서 고려하는 입력 유형에는 값의 범위, 입력값의 개수(카운트), 특정 유형의 집합 등이 있다. 소스코드의 라인 수는 화이트박스 테스트의 관심 대상이다."}, {"question": "제어 흐름 그래프(Control Flow Graph)에서 노드(Node)가 나타내는 것은?", "options": ["A. 분기 조건", "B. 연속된 순차 명령문의 블록", "C. 변수 선언", "D. 함수 호출"], "answer": "B", "explanation": "제어 흐름 그래프에서 노드(또는 기본 블록)는 순서대로 실행되는 연속된 명령문의 블록을 나타내며, 에지는 제어의 흐름(전이)을 나타낸다."}, {"question": "결정 테이블의 장점이 아닌 것은?", "options": ["A. 복잡한 비즈니스 로직을 시각적으로 표현할 수 있다", "B. 조건 조합을 빠짐없이 확인할 수 있다", "C. 소스코드의 내부 버그를 직접 식별할 수 있다", "D. 테스트 케이스 도출의 근거가 명확하다"], "answer": "C", "explanation": "결정 테이블은 블랙박스 기법으로, 소스코드의 내부 버그를 직접 식별할 수 없다. 복잡한 비즈니스 규칙을 체계적으로 표현하고 빠진 조건 조합을 발견하는 데 유용하다."}, {"question": "탐색적 테스트의 단점으로 옳은 것은?", "options": ["A. 미리 정의된 테스트 케이스보다 결함 발견율이 항상 낮다", "B. 테스트 재현성이 낮고 테스트 커버리지 측정이 어렵다", "C. 숙련된 테스터가 필요하지 않다", "D. 자동화 도구와 함께 사용할 수 없다"], "answer": "B", "explanation": "탐색적 테스트의 주요 단점은 사전 스크립트가 없어 테스트 재현성이 낮고, 커버리지 측정이 어려우며, 테스터의 역량에 크게 의존한다는 점이다."}, {"question": "범위가 1부터 10까지인 정수 입력에서 2-값 경계값 분석의 테스트 케이스 집합은?", "options": ["A. {0, 1, 10, 11}", "B. {1, 5, 10}", "C. {0, 5, 11}", "D. {1, 10}"], "answer": "A", "explanation": "2-값 경계값 분석은 각 경계에서 경계값과 그 바로 밖의 값을 선택한다. 하한 경계: 0(경계 외), 1(경계 내) / 상한 경계: 10(경계 내), 11(경계 외)로 총 {0, 1, 10, 11} 4개이다."}, {"question": "조건 'A AND B'에서 조건 커버리지를 달성하는 최소 테스트 케이스 집합은?", "options": ["A. {A=T, B=T}", "B. {A=T, B=F}, {A=F, B=T}", "C. {A=T, B=T}, {A=F, B=F}", "D. {A=T, B=T}, {A=T, B=F}, {A=F, B=T}, {A=F, B=F}"], "answer": "B", "explanation": "조건 커버리지는 각 개별 조건(A, B)이 True와 False로 모두 평가되어야 한다. {A=T, B=F}에서 A는 True, B는 False 평가. {A=F, B=T}에서 A는 False, B는 True 평가. 2개의 테스트 케이스로 달성 가능하다."}, {"question": "상태 전이 테스트에서 상태 테이블(State Table)의 용도는?", "options": ["A. 상태 전이 다이어그램을 표 형식으로 표현하여 유효/무효 전이를 명확히 한다", "B. 데이터베이스 테이블을 테스트한다", "C. 상태 변수의 값을 기록한다", "D. 테스트 실행 시간을 기록한다"], "answer": "A", "explanation": "상태 테이블은 상태 전이 다이어그램을 표(행: 현재 상태, 열: 이벤트) 형식으로 표현한 것으로, 각 셀에는 다음 상태와 액션을 기재하고 유효하지 않은 전이를 명확히 표시할 수 있다."}, {"question": "테스트 오라클(Test Oracle)이란?", "options": ["A. 테스트 자동화 도구의 이름이다", "B. 테스트 결과의 합격/불합격 여부를 판단하는 기준 또는 메커니즘이다", "C. 테스트 팀의 리더이다", "D. 테스트 데이터베이스이다"], "answer": "B", "explanation": "테스트 오라클은 테스트 실행 결과가 올바른지(기대 결과와 일치하는지) 판단하는 기준이나 메커니즘이다. 요구사항 명세, 다른 버전의 프로그램, 수학 공식 등이 오라클로 사용될 수 있다."}, {"question": "동등 분할에서 '하위 파티셔닝(Sub-partitioning)'이 필요한 경우는?", "options": ["A. 파티션 내의 값들이 시스템에 의해 동일하게 처리되지 않는 경우", "B. 테스트 케이스 수를 늘려야 하는 경우", "C. 파티션의 경계값을 분석해야 하는 경우", "D. 무효 파티션을 테스트해야 하는 경우"], "answer": "A", "explanation": "하위 파티셔닝은 동등 클래스 내의 값들이 시스템에서 실제로 동일하게 처리되지 않는다고 판단될 때 해당 클래스를 더 세분화하는 작업이다."}, {"question": "다음 코드에서 결정 커버리지 100%를 달성하는 최소 테스트 케이스 수는?\n\nif (x > 0 && y > 0) {\n  result = x + y;\n} else {\n  result = 0;\n}", "options": ["A. 1개", "B. 2개", "C. 3개", "D. 4개"], "answer": "B", "explanation": "결정 커버리지는 전체 조건식이 True인 경우와 False인 경우를 모두 테스트해야 한다. True: x>0 AND y>0 (예: x=1, y=1) / False: 조건이 False인 경우 (예: x=-1, y=1). 최소 2개의 테스트 케이스로 달성 가능하다."}, {"question": "페어와이즈 테스트의 이론적 근거는?", "opti
