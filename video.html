<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이진혁 | 영상 포트폴리오</title>
  <style>
    :root {
      --accent: #978FF9;
      --accent-dim: rgba(151, 143, 249, 0.12);
      --accent-border: rgba(151, 143, 249, 0.28);
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e2e2e2;
      --text-sub: #888;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    .wrap {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .back {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-sub);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back:hover { color: var(--accent); }

    .title-block { display: flex; flex-direction: column; gap: 6px; }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
    }

    .sub {
      font-size: 1rem;
      color: var(--text-sub);
    }

    .player-wrap {
      background: #000;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      width: 100%;
      aspect-ratio: 16 / 9;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
    }

    footer {
      font-size: 0.88rem;
      color: var(--text-sub);
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← 포트폴리오로 돌아가기</a>

    <div class="title-block">
      <h1>자기소개 영상</h1>
      <div class="sub">이진혁 · 게임 QA 지망생</div>
    </div>

    <div class="player-wrap">
      <video controls preload="metadata">
        <source src="https://napyu0808.github.io/Portfolio/intro.mp4" type="video/mp4" />
        브라우저가 영상 재생을 지원하지 않습니다.
      </video>
    </div>

    <footer>© 2026 이진혁</footer>
  </div>
</body>
</html>
